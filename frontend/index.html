<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Catálogo" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="description" content="Catálogo, pedidos e atendimento integrado." />
    <style>
      :root { color-scheme: light; }

      html, body { margin: 0; padding: 0; }

      body.app-shell-loading {
        margin: 0;
        overflow: hidden;
        background: #ffffff;
      }

      #app-splash {
        --splash-bg: #ffffff;
        --splash-fg: #0f172a;
        --splash-muted: #64748b;
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 18px;
        background: var(--splash-bg);
        padding:
          env(safe-area-inset-top, 0px)
          env(safe-area-inset-right, 0px)
          env(safe-area-inset-bottom, 0px)
          env(safe-area-inset-left, 0px);
        opacity: 1;
        transition: opacity 240ms ease;
      }

      #app-splash[data-view='admin'] {
        --splash-bg: #ffffff;
        --splash-fg: #0f172a;
      }

      #app-splash[data-view='stock'] {
        --splash-bg: #ffffff;
        --splash-fg: #0f172a;
      }

      #app-splash[data-state='closing'] {
        opacity: 0;
        pointer-events: none;
      }

      .app-splash__logo {
        width: 64px;
        height: 64px;
        border-radius: 18px;
        object-fit: cover;
        opacity: 0;
        transform: scale(0.96);
        animation: splashFadeIn 280ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      .app-splash__brand {
        margin: 0;
        color: var(--splash-fg);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', system-ui, sans-serif;
        font-size: 17px;
        font-weight: 600;
        letter-spacing: -0.01em;
        opacity: 0;
        animation: splashFadeIn 280ms cubic-bezier(0.16, 1, 0.3, 1) 60ms forwards;
      }

      @keyframes splashFadeIn {
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>
    <script>
      (function () {
        var pathParts = window.location.pathname.split('/').filter(Boolean)
        var slug = ''
        var channel = 'catalogo'
        var firstPath = pathParts[0] || ''
        var adminPaths = {
          admin: true, dashboard: true, login: true, leads: true, clientes: true,
          busca: true, mensagens: true, notificacoes: true, campanhas: true,
          automacoes: true, criativos: true, creative: true, integracoes: true,
          produtos: true, pedidos: true, design: true, whatsapp: true,
          pagamentos: true, frete: true, dominio: true, agente: true,
          configuracoes: true,
        }
        var splashView = 'store'

        if ((pathParts[0] === 'catalogo' || pathParts[0] === 'loja') && pathParts[1]) {
          slug = decodeURIComponent(pathParts[1])
          channel = pathParts[0]
        }

        if (adminPaths[firstPath]) splashView = 'admin'
        else if (firstPath === 'app-estoque' || firstPath === 'inventario' || firstPath === 'estoque') splashView = 'stock'

        var params = new URLSearchParams()
        if (slug) {
          params.set('slug', slug)
          params.set('channel', channel)
        }

        var query = params.toString()
        var querySuffix = query ? '?' + query : ''
        var iconSuffix = query ? '?' + query + '&size=192' : '?size=192'
        var iconLargeSuffix = query ? '?' + query + '&size=512' : '?size=512'
        // When there's no brand slug (admin/landing/login), use the LeadCapture
        // brand mark — a crosshair on a black square. When there's a slug,
        // use the brand-specific dynamic icon.
        var splashIcon = slug ? '/pwa/icon' + iconSuffix : '/brand-mark.svg'

        var brandNames = { store: 'Catálogo', admin: 'Admin', stock: 'Estoque' }

        function appendLink(id, rel, href, sizes, type) {
          var link = document.createElement('link')
          link.id = id
          link.rel = rel
          link.href = href
          if (sizes) link.sizes = sizes
          if (type) link.type = type
          document.head.appendChild(link)
        }

        appendLink('pwa-manifest', 'manifest', '/pwa/manifest.webmanifest' + querySuffix)

        if (slug) {
          appendLink('pwa-apple-touch-icon', 'apple-touch-icon', '/pwa/icon' + iconSuffix, '192x192')
          appendLink('pwa-favicon-192', 'icon', '/pwa/icon' + iconSuffix, '192x192')
          appendLink('pwa-favicon-512', 'icon', '/pwa/icon' + iconLargeSuffix, '512x512')
        } else {
          // LeadCapture default — crosshair brand mark
          appendLink('pwa-favicon-svg', 'icon', '/brand-mark.svg', null, 'image/svg+xml')
          appendLink('pwa-apple-touch-icon', 'apple-touch-icon', '/brand-mark.svg', '180x180')
        }

        window.__LC_SPLASH__ = {
          startedAt: Date.now(),
          dismiss: function () {
            var splash = document.getElementById('app-splash')
            if (!splash || splash.dataset.state === 'closing') return
            splash.dataset.state = 'closing'
            document.body.classList.remove('app-shell-loading')
            window.setTimeout(function () { splash.remove() }, 260)
          },
        }

        window.__LC_SPLASH_CONFIG__ = {
          view: splashView,
          icon: splashIcon,
          brand: brandNames[splashView] || 'Catálogo',
        }
      })()
    </script>
    <title>Catálogo</title>
  </head>
  <body class="app-shell-loading">
    <div id="app-splash" aria-hidden="true">
      <img id="app-splash-logo" class="app-splash__logo" src="/logo.png" alt="" />
      <p id="app-splash-brand" class="app-splash__brand">Catálogo</p>
    </div>
    <script>
      (function () {
        var config = window.__LC_SPLASH_CONFIG__
        var splash = document.getElementById('app-splash')
        if (!config || !splash) return
        splash.dataset.view = config.view
        document.getElementById('app-splash-logo').src = config.icon
        document.getElementById('app-splash-brand').textContent = config.brand
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
