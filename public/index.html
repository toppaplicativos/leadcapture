    <div id="root"></div>
    <script>
      (function () {
        var LEGACY_LABELS = {
          "Store Builder": "Meu Catalogo",
          "1 loja por brand": "Catalogo por marca",
          "Loja da brand ativa": "Catalogo ativo",
          "Navegacao Store Builder": "Navegacao do catalogo",
          "Design": "Design do catalogo",
          "Configuracoes": "Dominio e politicas",
          "Ver Loja Publica": "Ver catalogo publico",
          "Carregando Store Builder...": "Carregando catalogo...",
          "Dashboard da Loja Publica": "Visao geral do catalogo",
          "Configuracoes estruturais": "Dominio, SEO e politicas",
          "6.1 Informacoes Gerais": "Identidade e dominio do catalogo",
          "6.2 Politicas da Loja": "Politicas publicas do catalogo",
          "Nome da loja": "Nome do catalogo",
          "Dominio personalizado": "Dominio do catalogo",
          "Salvar Configuracoes": "Salvar dominio e politicas",
          "Design salvo com sucesso.": "Visual do catalogo salvo com sucesso.",
          "Salvar Design": "Salvar visual do catalogo"
        };

        function normalizeText(value) {
          return String(value || "")
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .replace(/\s+/g, " ")
            .trim();
        }

        function replaceLegacyText(root) {
          if (!root) return;

          var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
          var currentNode;
          while ((currentNode = walker.nextNode())) {
            var normalized = normalizeText(currentNode.nodeValue);
            if (LEGACY_LABELS[normalized]) {
              currentNode.nodeValue = LEGACY_LABELS[normalized];
            }
          }

          var navigation = root.querySelector('.lojas-rail-nav');
          if (navigation) {
            navigation.setAttribute('aria-label', 'Navegacao do catalogo');
          }
        }

        function removeLegacyPagesAccess(root) {
          if (!root) return;

          var pageButtons = Array.prototype.slice.call(root.querySelectorAll('button')).filter(function (button) {
            return normalizeText(button.textContent) === 'Paginas';
          });

          pageButtons.forEach(function (button) {
            button.remove();
          });

          var currentHeading = Array.prototype.slice.call(root.querySelectorAll('h1,h2,h3,h4')).find(function (heading) {
            return normalizeText(heading.textContent) === 'Paginas publicas';
          });

          if (!currentHeading) return;

          var fallbackButton = Array.prototype.slice.call(root.querySelectorAll('button')).find(function (button) {
            var label = normalizeText(button.textContent);
            return label === 'Produtos' || label === 'Catalogo visual' || label === 'Dashboard';
          });

          if (fallbackButton) {
            fallbackButton.click();
          }
        }

        function cleanupStorefrontStudio() {
          var studioRoot = document.querySelector('.lojas-studio-shell');
          if (!studioRoot) return;

          replaceLegacyText(studioRoot);
          removeLegacyPagesAccess(studioRoot);
        }

        function bootStorefrontCleanup() {
          cleanupStorefrontStudio();

          var observer = new MutationObserver(function () {
            cleanupStorefrontStudio();
          });

          observer.observe(document.body, {
            childList: true,
            subtree: true,
            characterData: true
          });
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', bootStorefrontCleanup, { once: true });
        } else {
          bootStorefrontCleanup();
        }
      })();
    </script>
    <script>
      (function () {
        (function resetLegacyServiceWorkerOnce() {
          if (typeof window === "undefined" || typeof navigator === "undefined") return;
          if (!("serviceWorker" in navigator)) return;

          const RESET_KEY = "lead-system:sw-reset-v1";
          if (window.localStorage.getItem(RESET_KEY) === "1") return;

          navigator.serviceWorker
            .getRegistrations()
            .then((registrations) => {
              return Promise.all(registrations.map((registration) => registration.unregister()));
            })
            .catch(() => null)
            .finally(() => {
              if (typeof window.caches !== "undefined") {
                window.caches
                  .keys()
                  .then((keys) => Promise.all(keys.map((key) => window.caches.delete(key))))
                  .catch(() => null)
                  .finally(() => {
                    window.localStorage.setItem(RESET_KEY, "1");
                  });
                return;
              }

              window.localStorage.setItem(RESET_KEY, "1");
            });
        })();

        function enhancePasswordFields() {
          const path = String(window.location.pathname || "").toLowerCase();
          const isAuthPage = path.includes("/login") || path.includes("/registro");
          if (!isAuthPage) return;

          const forms = document.querySelectorAll("form.auth-form");
          forms.forEach((form) => {
            const passwordInputs = form.querySelectorAll('input[type="password"]');
            passwordInputs.forEach((input, index) => {
              if (!(input instanceof HTMLInputElement)) return;
              if (input.dataset.pwToggleAttached === "1") return;

              input.dataset.pwToggleAttached = "1";

              const wrapper = document.createElement("div");
              wrapper.style.display = "flex";
              wrapper.style.alignItems = "center";
              wrapper.style.gap = "8px";

              const parent = input.parentElement;
              if (!parent) return;

              const toggle = document.createElement("button");
              toggle.type = "button";
              toggle.className = "btn-secondary";
              toggle.style.padding = "8px 10px";
              toggle.style.whiteSpace = "nowrap";
              toggle.setAttribute("aria-label", "Mostrar senha");
              toggle.textContent = "Mostrar";

              parent.replaceChild(wrapper, input);
              wrapper.appendChild(input);
              wrapper.appendChild(toggle);

              toggle.addEventListener("click", function () {
                const visible = input.type === "text";
                input.type = visible ? "password" : "text";
                toggle.textContent = visible ? "Mostrar" : "Ocultar";
                toggle.setAttribute("aria-label", visible ? "Mostrar senha" : "Ocultar senha");
              });

              if (index > 1) {
                toggle.style.display = "none";
              }
            });
          });
        }

        function enhanceBrandLogoUploader() {
          const TOKEN_KEY = "lead-system-token";
          const ACTIVE_BRAND_KEY = "lead-system:active-brand-id";

          if (!document.getElementById("brand-logo-uploader-styles")) {
            const styles = document.createElement("style");
            styles.id = "brand-logo-uploader-styles";
            styles.textContent = `
              @keyframes brandLogoSkeletonPulse {
                0% { opacity: .55; }
                50% { opacity: .95; }
                100% { opacity: .55; }
              }
              .brand-logo-upload-card {
                margin-top: 0;
                border: 1px solid rgba(100,116,139,.35);
                border-radius: 14px;
                padding: 12px;
                background: rgba(2,6,23,.12);
                display: flex;
                align-items: flex-start;
                gap: 12px;
                flex-wrap: wrap;
              }
              .brand-logo-hero {
                margin: 0 0 12px;
                display: flex;
                flex-direction: column;
                gap: 8px;
              }
              .brand-logo-hero-title {
                font-size: 13px;
                color: rgba(148,163,184,.95);
              }
              .brand-logo-preview {
                width: 120px;
                height: 120px;
                padding: 0;
                line-height: 0;
                border-radius: 18px;
                border: 1px dashed rgba(148,163,184,.65);
                background: linear-gradient(135deg, rgba(100,116,139,.22), rgba(148,163,184,.08));
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                overflow: hidden;
                position: relative;
                transition: transform .2s ease, border-color .2s ease;
              }
              .brand-logo-preview:hover {
                transform: translateY(-1px);
                border-color: rgba(59,130,246,.8);
              }
              .brand-logo-preview.circle {
                border-radius: 999px;
              }
              .brand-logo-preview img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                object-position: center;
                display: block;
              }
              .brand-logo-skeleton {
                width: 70%;
                height: 70%;
                border-radius: inherit;
                background: linear-gradient(90deg, rgba(148,163,184,.18), rgba(226,232,240,.35), rgba(148,163,184,.18));
                animation: brandLogoSkeletonPulse 1.4s ease-in-out infinite;
              }
              .brand-logo-upload-actions {
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
                align-items: center;
              }
              .brand-logo-upload-hint {
                margin: 0;
                font-size: 12px;
                color: rgba(148,163,184,.95);
              }
              .brand-logo-status {
                font-size: 12px;
                color: rgba(226,232,240,.95);
              }
            `;
            document.head.appendChild(styles);
          }

          const labels = document.querySelectorAll("label");
          labels.forEach((label) => {
            if (!(label instanceof HTMLLabelElement)) return;
            if (label.dataset.logoUploaderAttached === "1") return;

            const rawText = String(label.textContent || "").replace(/\s+/g, " ").trim().toLowerCase();
            if (!rawText.includes("logo (url)")) return;

            const originalInput = label.querySelector("input");
            if (!(originalInput instanceof HTMLInputElement)) return;

            const parentForm = label.closest("form");
            if (!(parentForm instanceof HTMLFormElement)) return;

            label.dataset.logoUploaderAttached = "1";
            label.style.display = "none";

            const uploadWrap = document.createElement("div");
            uploadWrap.className = "brand-logo-upload-card";

            const heroWrap = document.createElement("div");
            heroWrap.className = "brand-logo-hero";

            const heroTitle = document.createElement("div");
            heroTitle.className = "brand-logo-hero-title";
            heroTitle.textContent = "Logo da brand";

            const previewButton = document.createElement("button");
            previewButton.type = "button";
            previewButton.className = "brand-logo-preview circle";
            previewButton.setAttribute("aria-label", "Selecionar logo da brand");

            const fileInput = document.createElement("input");
            fileInput.type = "file";
            fileInput.accept = "image/*";
            fileInput.style.display = "none";

            const actions = document.createElement("div");
            actions.className = "brand-logo-upload-actions";

            const selectButton = document.createElement("button");
            selectButton.type = "button";
            selectButton.className = "btn-secondary";
            selectButton.textContent = "Selecionar imagem";

            const clearButton = document.createElement("button");
            clearButton.type = "button";
            clearButton.className = "btn-secondary";
            clearButton.textContent = "Remover";

            const hint = document.createElement("p");
            hint.className = "brand-logo-upload-hint";
            hint.textContent = "Clique no card para enviar.";

            const status = document.createElement("small");
            status.className = "brand-logo-status";
            status.textContent = "Pronto para upload.";

            let localPreviewUrl = "";

            const clearLocalPreviewUrl = () => {
              if (!localPreviewUrl) return;
              try { URL.revokeObjectURL(localPreviewUrl); } catch (_) {}
              localPreviewUrl = "";
            };

            const renderPreview = (imageUrl) => {
              previewButton.innerHTML = "";
              if (imageUrl) {
                const img = document.createElement("img");
                img.src = imageUrl;
                img.alt = "Prévia da logo";
                previewButton.appendChild(img);
                status.textContent = "Imagem carregada.";
                return;
              }

              const skeleton = document.createElement("div");
              skeleton.className = "brand-logo-skeleton";
              previewButton.appendChild(skeleton);
              status.textContent = "Pronto para upload.";
            };

            renderPreview(String(originalInput.value || "").trim());

            /* React ignores native value= assignment; we must use the
               internal setter so React's change-tracking picks it up. */
            const nativeInputValueSetter =
              Object.getOwnPropertyDescriptor(HTMLInputElement.prototype, "value")?.set;

            const setReactInputValue = (el, val) => {
              if (nativeInputValueSetter) {
                nativeInputValueSetter.call(el, val);
              } else {
                el.value = val;
              }
              el.dispatchEvent(new Event("input", { bubbles: true }));
              el.dispatchEvent(new Event("change", { bubbles: true }));
            };

            previewButton.addEventListener("click", () => fileInput.click());
            selectButton.addEventListener("click", () => fileInput.click());
            clearButton.addEventListener("click", () => {
              clearLocalPreviewUrl();
              setReactInputValue(originalInput, "");
              renderPreview("");
            });

            fileInput.addEventListener("change", async () => {
              const file = fileInput.files && fileInput.files[0];
              if (!file) return;

              clearLocalPreviewUrl();
              localPreviewUrl = URL.createObjectURL(file);
              renderPreview(localPreviewUrl);
              status.textContent = `Imagem selecionada: ${file.name}`;

              const token = String(window.localStorage.getItem(TOKEN_KEY) || "").trim();
              if (!token) {
                status.textContent = "Sessão inválida. Faça login novamente.";
                fileInput.value = "";
                return;
              }

              status.textContent = "Enviando imagem...";

              try {
                const formData = new FormData();
                formData.append("image", file);
                formData.append("file", file);

                const headers = { Authorization: `Bearer ${token}` };
                const activeBrandId = String(window.localStorage.getItem(ACTIVE_BRAND_KEY) || "").trim();
                if (activeBrandId) {
                  headers["x-brand-id"] = activeBrandId;
                }

                const tryUpload = async (useBrandHeader) => {
                  const nextHeaders = { Authorization: `Bearer ${token}` };
                  if (useBrandHeader && activeBrandId) {
                    nextHeaders["x-brand-id"] = activeBrandId;
                  }

                  const response = await fetch("/api/ai/creatives/image/upload", {
                    method: "POST",
                    headers: nextHeaders,
                    body: formData,
                  });

                  const text = await response.text();
                  let payload = {};
                  try {
                    payload = text ? JSON.parse(text) : {};
                  } catch {
                    payload = { message: text || "Falha no upload da imagem" };
                  }

                  if (!response.ok) {
                    const errorMessage = payload.error || payload.message || "Falha no upload da imagem";
                    throw new Error(String(errorMessage));
                  }

                  return payload;
                };

                const tryUploadViaMedia = async () => {
                  const altForm = new FormData();
                  altForm.append("file", file);

                  const response = await fetch("/api/media/upload", {
                    method: "POST",
                    headers: { Authorization: `Bearer ${token}` },
                    body: altForm,
                  });

                  const text = await response.text();
                  let payload = {};
                  try {
                    payload = text ? JSON.parse(text) : {};
                  } catch {
                    payload = { message: text || "Falha no upload da imagem" };
                  }

                  if (!response.ok) {
                    throw new Error(String(payload.error || payload.message || "Falha no upload da imagem"));
                  }

                  const mediaUrl = String(payload?.file?.url || payload?.file?.path || "").trim();
                  if (!mediaUrl) {
                    throw new Error("Upload concluído, mas URL da imagem não foi retornada");
                  }

                  const normalizedUrl = mediaUrl.startsWith("http")
                    ? mediaUrl.replace(window.location.origin, "") || mediaUrl
                    : mediaUrl;

                  return { imageUrl: normalizedUrl };
                };

                let payload;
                if (!activeBrandId) {
                  payload = await tryUploadViaMedia();
                  status.textContent = "Upload concluído via mídia (sem brand ativa).";
                } else {
                  try {
                    payload = await tryUpload(true);
                  } catch (firstError) {
                    try {
                      payload = await tryUpload(false);
                      status.textContent = "Upload concluído (fallback de brand aplicado).";
                    } catch (secondError) {
                      payload = await tryUploadViaMedia();
                      status.textContent = "Upload concluído via mídia (fallback).";
                    }
                  }
                }

                const uploadedUrl = String(payload.imageUrl || payload?.asset?.fileUrl || "").trim();
                if (!uploadedUrl) {
                  throw new Error("Upload concluído, mas URL da imagem não foi retornada");
                }

                setReactInputValue(originalInput, uploadedUrl);
                clearLocalPreviewUrl();
                renderPreview(uploadedUrl);
                status.textContent = "Upload concluído com sucesso.";
              } catch (error) {
                const message = error instanceof Error ? error.message : "Falha ao enviar imagem";
                status.textContent = message;
              } finally {
                fileInput.value = "";
              }
            });

            const infoWrap = document.createElement("div");
            infoWrap.style.display = "flex";
            infoWrap.style.flexDirection = "column";
            infoWrap.style.gap = "8px";

            actions.appendChild(selectButton);
            actions.appendChild(clearButton);

            infoWrap.appendChild(actions);
            infoWrap.appendChild(hint);
            infoWrap.appendChild(status);

            uploadWrap.appendChild(previewButton);
            uploadWrap.appendChild(infoWrap);
            uploadWrap.appendChild(fileInput);

            heroWrap.appendChild(heroTitle);
            heroWrap.appendChild(uploadWrap);

            parentForm.insertAdjacentElement("afterbegin", heroWrap);
          });
        }

        function enhanceGlobalUploadCards() {
          if (!document.getElementById("global-upload-card-styles")) {
            const styles = document.createElement("style");
            styles.id = "global-upload-card-styles";
            styles.textContent = `
              @keyframes globalUploadSkeletonPulse {
                0% { opacity: .55; }
                50% { opacity: .95; }
                100% { opacity: .55; }
              }
              .global-upload-card {
                margin-top: 8px;
                border: 1px solid rgba(100,116,139,.35);
                border-radius: 14px;
                padding: 12px;
                background: rgba(2,6,23,.2);
                display: flex;
                flex-direction: column;
                gap: 8px;
              }
              .global-upload-preview {
                width: 160px;
                height: 160px;
                border-radius: 16px;
                border: 1px dashed rgba(148,163,184,.65);
                background: linear-gradient(135deg, rgba(100,116,139,.2), rgba(148,163,184,.08));
                display: flex;
                align-items: center;
                justify-content: center;
                overflow: hidden;
                cursor: pointer;
              }
              .global-upload-preview img {
                width: 100%;
                height: 100%;
                object-fit: cover;
              }
              .global-upload-skeleton {
                width: 72%;
                height: 72%;
                border-radius: 12px;
                background: linear-gradient(90deg, rgba(148,163,184,.2), rgba(226,232,240,.35), rgba(148,163,184,.2));
                animation: globalUploadSkeletonPulse 1.4s ease-in-out infinite;
              }
              .global-upload-meta {
                font-size: 12px;
                color: rgba(226,232,240,.92);
              }
              .global-upload-actions {
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
              }
            `;
            document.head.appendChild(styles);
          }

          const fileInputs = document.querySelectorAll('input[type="file"]');
          fileInputs.forEach((fileInput) => {
            if (!(fileInput instanceof HTMLInputElement)) return;
            if (fileInput.dataset.uploadCardAttached === "1") return;
            if (fileInput.closest(".brand-logo-upload-card")) return;

            fileInput.dataset.uploadCardAttached = "1";
            fileInput.style.display = "none";

            const card = document.createElement("div");
            card.className = "global-upload-card";

            const preview = document.createElement("button");
            preview.type = "button";
            preview.className = "global-upload-preview";
            preview.setAttribute("aria-label", "Selecionar arquivo");

            const actions = document.createElement("div");
            actions.className = "global-upload-actions";

            const selectButton = document.createElement("button");
            selectButton.type = "button";
            selectButton.className = "btn-secondary";
            selectButton.textContent = "Selecionar arquivo";

            const clearButton = document.createElement("button");
            clearButton.type = "button";
            clearButton.className = "btn-secondary";
            clearButton.textContent = "Limpar";

            const meta = document.createElement("small");
            meta.className = "global-upload-meta";

            const revokePreviewUrl = () => {
              const oldUrl = String(preview.dataset.previewUrl || "").trim();
              if (oldUrl) {
                URL.revokeObjectURL(oldUrl);
                delete preview.dataset.previewUrl;
              }
            };

            const renderPreview = () => {
              revokePreviewUrl();
              preview.innerHTML = "";

              const files = fileInput.files;
              if (!files || files.length === 0) {
                const skeleton = document.createElement("div");
                skeleton.className = "global-upload-skeleton";
                preview.appendChild(skeleton);
                meta.textContent = "Nenhum arquivo selecionado.";
                return;
              }

              const firstFile = files[0];
              if (firstFile && firstFile.type && firstFile.type.startsWith("image/")) {
                const url = URL.createObjectURL(firstFile);
                preview.dataset.previewUrl = url;
                const img = document.createElement("img");
                img.src = url;
                img.alt = "Prévia do arquivo";
                preview.appendChild(img);
              } else {
                const text = document.createElement("strong");
                text.textContent = "Arquivo selecionado";
                text.style.fontSize = "12px";
                text.style.color = "rgba(226,232,240,.95)";
                text.style.textAlign = "center";
                preview.appendChild(text);
              }

              meta.textContent = files.length > 1
                ? `${files.length} arquivos selecionados`
                : firstFile.name;
            };

            preview.addEventListener("click", () => fileInput.click());
            selectButton.addEventListener("click", () => fileInput.click());
            clearButton.addEventListener("click", () => {
              fileInput.value = "";
              fileInput.dispatchEvent(new Event("change", { bubbles: true }));
              renderPreview();
            });
            fileInput.addEventListener("change", () => renderPreview());

            renderPreview();

            actions.appendChild(selectButton);
            actions.appendChild(clearButton);
            card.appendChild(preview);
            card.appendChild(actions);
            card.appendChild(meta);

            fileInput.insertAdjacentElement("afterend", card);
          });
        }

        function enhanceBrandIdentityRuntime() {
          const TOKEN_KEY = "lead-system-token";
          const ACTIVE_BRAND_KEY = "lead-system:active-brand-id";

          if (!document.getElementById("brand-identity-runtime-style")) {
            const style = document.createElement("style");
            style.id = "brand-identity-runtime-style";
            style.textContent = `
              .brand-runtime-logo {
                border-radius: 10px !important;
                object-fit: cover !important;
              }
              .brand-runtime-name {
                letter-spacing: .01em;
              }
              .btn-link,
              .ms-view-all,
              .ms-category-icon,
              .ms-product-price-wrap strong {
                color: var(--primary) !important;
              }
              .ms-logo-mark:before,
              .ms-logo-mark:after,
              .notification-info,
              .pwa-install-prompt {
                background: linear-gradient(135deg, var(--primary), var(--primary-strong)) !important;
              }
            `;
            document.head.appendChild(style);
          }

          const state = window.__brandIdentityRuntimeState || {
            running: false,
            lastBrandId: "",
            lastToken: "",
            timerId: null,
            initialized: false,
            lastBrand: null,
          };
          window.__brandIdentityRuntimeState = state;

          const sanitizeColor = (value, fallback) => {
            const raw = String(value || "").trim();
            if (/^#[0-9a-fA-F]{3,8}$/.test(raw)) return raw;
            return fallback;
          };

          const setBrandText = (selector, text, defaultValue) => {
            document.querySelectorAll(selector).forEach((node) => {
              if (!(node instanceof HTMLElement)) return;
              if (!node.dataset.brandDefaultText) {
                node.dataset.brandDefaultText = node.textContent || defaultValue;
              }
              node.textContent = text || node.dataset.brandDefaultText || defaultValue;
              node.classList.add("brand-runtime-name");
            });
          };

          const applyBrandIdentity = (brand) => {
            if (!brand) return;

            const primary = sanitizeColor(brand.primary_color, "#0f82ff");
            const secondary = sanitizeColor(brand.secondary_color, "#0068d1");

            document.documentElement.style.setProperty("--primary", primary);
            document.documentElement.style.setProperty("--primary-strong", secondary);
            document.documentElement.style.setProperty("--ms-primary", primary);
            document.documentElement.style.setProperty("--ms-primary-strong", secondary);

            const themeMeta = document.querySelector('meta[name="theme-color"]');
            if (themeMeta instanceof HTMLMetaElement) {
              themeMeta.content = primary;
            }

            const logoUrl = String(brand.logo_url || "").trim();
            if (logoUrl) {
              const iconSelectors = [
                'link[rel="icon"]',
                'link[rel="shortcut icon"]',
                'link[rel="apple-touch-icon"]',
                'link[rel="apple-touch-startup-image"]'
              ];
              iconSelectors.forEach((selector) => {
                document.querySelectorAll(selector).forEach((el) => {
                  if (el instanceof HTMLLinkElement) {
                    el.href = logoUrl;
                  }
                });
              });

              document.querySelectorAll("img").forEach((img) => {
                if (!(img instanceof HTMLImageElement)) return;
                const src = String(img.getAttribute("src") || "").trim();
                const cls = String(img.className || "");
                const alt = String(img.alt || "").toLowerCase();
                const probablyBrandLogo =
                  src.endsWith("/logo.png") ||
                  src.includes("logo.png") ||
                  src.includes("brand-mark") ||
                  cls.includes("brand-logo") ||
                  cls.includes("splash-logo") ||
                  cls.includes("ms-logo-img") ||
                  alt.includes("lead") ||
                  alt.includes("logo");

                if (!probablyBrandLogo) return;
                img.src = logoUrl;
                img.classList.add("brand-runtime-logo");
              });
            }

            const brandName = String(brand.name || "").trim();
            const slogan = String(brand.slogan || "").trim();
            if (brandName) {
              document.title = `${brandName} • Lead System`;
              setBrandText(".sidebar .brand strong", brandName, "Lead System");
              setBrandText(".splash-brand strong", brandName, "Lead System");
              setBrandText(".ms-logo strong", brandName, "Lead System");
            }
            if (slogan) {
              setBrandText(".sidebar .brand p", slogan, "Painel comercial");
            }
          };

          if (state.initialized) {
            if (state.lastBrand) {
              applyBrandIdentity(state.lastBrand);
            }
            return;
          }

          const refreshBrandIdentity = async (force = false) => {
            if (state.running) return;

            const token = String(window.localStorage.getItem(TOKEN_KEY) || "").trim();
            if (!token) return;

            const localActiveBrandId = String(window.localStorage.getItem(ACTIVE_BRAND_KEY) || "").trim();
            if (!force && state.lastBrandId === localActiveBrandId && state.lastToken === token) {
              return;
            }

            state.running = true;
            try {
              const headers = { Authorization: `Bearer ${token}` };
              if (localActiveBrandId) {
                headers["x-brand-id"] = localActiveBrandId;
              }

              const response = await fetch("/api/brands", { method: "GET", headers });
              if (!response.ok) return;

              const payload = await response.json().catch(() => null);
              const brands = Array.isArray(payload?.brands) ? payload.brands : [];
              const activeId = String(localActiveBrandId || payload?.active_brand_id || "").trim();
              const brand = brands.find((item) => String(item?.id || "").trim() === activeId) || brands[0] || null;
              if (!brand) return;

              applyBrandIdentity(brand);
              state.lastBrand = brand;
              state.lastBrandId = String(brand.id || activeId || "").trim();
              state.lastToken = token;
            } catch (_) {
            } finally {
              state.running = false;
            }
          };

          refreshBrandIdentity();

          if (!state.timerId) {
            state.timerId = window.setInterval(() => {
              refreshBrandIdentity(false);
            }, 3500);
          }

          window.addEventListener("storage", (event) => {
            if (event.key === ACTIVE_BRAND_KEY || event.key === TOKEN_KEY) {
              refreshBrandIdentity(true);
            }
          });

          window.addEventListener("focus", () => refreshBrandIdentity(false));
          state.initialized = true;
        }

        function enhanceBrandLogoInLists() {
          const TOKEN_KEY = "lead-system-token";
          const ACTIVE_BRAND_KEY = "lead-system:active-brand-id";

          if (!document.getElementById("brand-list-logo-runtime-style")) {
            const style = document.createElement("style");
            style.id = "brand-list-logo-runtime-style";
            style.textContent = `
              .brand-list-logo-chip {
                width: 18px;
                height: 18px;
                border-radius: 999px;
                object-fit: cover;
                border: 1px solid rgba(148,163,184,.55);
                margin-right: 6px;
                vertical-align: middle;
                display: inline-block;
                background: rgba(15,23,42,.4);
              }
              .brand-list-logo-wrap {
                display: inline-flex;
                align-items: center;
              }
            `;
            document.head.appendChild(style);
          }

          const state = window.__brandListLogoRuntimeState || {
            running: false,
            brands: [],
            fetchedAt: 0,
            token: "",
            activeBrandId: "",
          };
          window.__brandListLogoRuntimeState = state;

          const token = String(window.localStorage.getItem(TOKEN_KEY) || "").trim();
          if (!token) return;

          const activeBrandId = String(window.localStorage.getItem(ACTIVE_BRAND_KEY) || "").trim();

          const normalizeText = (value) =>
            String(value || "")
              .normalize("NFD")
              .replace(/[\u0300-\u036f]/g, "")
              .replace(/\s+/g, " ")
              .trim()
              .toLowerCase();

          const applyBrandListLogos = (brands) => {
            if (!Array.isArray(brands) || brands.length === 0) return;

            const headings = Array.from(document.querySelectorAll("h1,h2,h3,h4,[role='heading']"));
            const brandRoots = headings
              .filter((node) => /brand|branding|marca/i.test(String(node.textContent || "")))
              .map((node) => node.closest("section,main,article,div"))
              .filter((node) => node instanceof HTMLElement);

            if (brandRoots.length === 0) return;

            brandRoots.forEach((root) => {
              if (!(root instanceof HTMLElement)) return;
              const candidates = root.querySelectorAll("button,a,label,li,article,div,span,strong,p");

              candidates.forEach((node) => {
                if (!(node instanceof HTMLElement)) return;
                if (node.querySelector("img.brand-list-logo-chip")) return;
                if (node.querySelector("input,textarea,select")) return;

                const textRaw = String(node.textContent || "").replace(/\s+/g, " ").trim();
                if (!textRaw || textRaw.length > 120) return;
                const text = normalizeText(textRaw);

                const brand = brands.find((item) => {
                  const name = normalizeText(item?.name || "");
                  const slug = normalizeText(item?.slug || "");
                  if (!name && !slug) return false;
                  return text === name || text.startsWith(`${name} `) || (!!slug && (text === slug || text.startsWith(`${slug} `)));
                });

                const logoUrl = String(brand?.logo_url || "").trim();
                if (!brand || !logoUrl) return;

                const logo = document.createElement("img");
                logo.className = "brand-list-logo-chip";
                logo.src = logoUrl;
                logo.alt = `Logo ${String(brand?.name || "brand")}`;

                const textSpan = document.createElement("span");
                textSpan.textContent = textRaw;

                node.innerHTML = "";
                const wrap = document.createElement("span");
                wrap.className = "brand-list-logo-wrap";
                wrap.appendChild(logo);
                wrap.appendChild(textSpan);
                node.appendChild(wrap);
              });
            });
          };

          const shouldRefetch =
            state.token !== token ||
            state.activeBrandId !== activeBrandId ||
            Date.now() - Number(state.fetchedAt || 0) > 15000;

          if (!shouldRefetch) {
            applyBrandListLogos(state.brands || []);
            return;
          }

          if (state.running) return;
          state.running = true;

          const headers = { Authorization: `Bearer ${token}` };
          if (activeBrandId) {
            headers["x-brand-id"] = activeBrandId;
          }

          fetch("/api/brands", { method: "GET", headers })
            .then((response) => (response.ok ? response.json() : null))
            .then((payload) => {
              const brands = Array.isArray(payload?.brands) ? payload.brands : [];
              state.brands = brands;
              state.fetchedAt = Date.now();
              state.token = token;
              state.activeBrandId = activeBrandId;
              applyBrandListLogos(brands);
            })
            .catch(() => null)
            .finally(() => {
              state.running = false;
            });
        }

        function enhanceLojaMobilePage() {

            injectStoreNavigation();

            /* ── Only enhance on store workspace ── */
            var shell = document.querySelector(".lojas-studio-shell");

                backBtn.textContent = "\u2190 Voltar ao Catálogo";

            var userChipMeta = shell.querySelector(".lojas-user-chip small");
            if (userChipMeta) userChipMeta.textContent = "Operação de catálogo";

            var railButtons = Array.from(shell.querySelectorAll(".lojas-rail-nav .lojas-rail-link"));
            var pagesButton = railButtons.find(function (link) {
              return /p[áa]ginas/i.test(link.textContent || "");
            });
            var productsButton = railButtons.find(function (link) {
              return /produtos/i.test(link.textContent || "");
            });
            if (pagesButton) {
              var pagesWasActive = pagesButton.classList.contains("active");
              pagesButton.remove();
              if (pagesWasActive && productsButton && !productsButton.classList.contains("active")) {
                productsButton.click();
              }

            /* ── One-time enhancements ── */
            if (shell.dataset.lojaRedesigned === "1") return;

            /* Inject hero/about image sections into Design tab */
            injectDesignImageSections(shell);
            injectStoreDomainManager(shell);

            /* Re-label the topbar */
            var viewLink = shell.querySelector(".lojas-topbar-actions .btn-secondary");
            if (viewLink) {
              viewLink.textContent = "Ver catálogo";
              if (!viewLink.dataset.catalogRuntimeBound) {
                viewLink.dataset.catalogRuntimeBound = "1";
                viewLink.addEventListener("click", function (e) {
                  e.preventDefault();
                  openActiveCatalogWindow();
                });
              }
            }

            shell.dataset.lojaRedesigned = "1";
          } finally {
            runtime.running = false;
          }
        }

        function resolveActiveStorefront() {
          var TOKEN_KEY = "lead-system-token";
          var ACTIVE_BRAND_KEYS = ["lead-system:active-brand-id", "leadcapture_brand_id", "selectedBrandId"];
          var token = "";
          var brandId = "";

          try { token = String(localStorage.getItem(TOKEN_KEY) || "").trim(); } catch (_) {}
          try {
            for (var i = 0; i < ACTIVE_BRAND_KEYS.length; i += 1) {
              var candidate = String(localStorage.getItem(ACTIVE_BRAND_KEYS[i]) || "").trim();
              if (candidate) {
                brandId = candidate;
                break;
              }
            }
          } catch (_) {}

          var cacheKey = "storefront_active_store::" + (brandId || "default");
          try {
            var cachedRaw = sessionStorage.getItem(cacheKey);
            if (cachedRaw) {
              var cached = JSON.parse(cachedRaw);
              if (cached && cached.slug) return Promise.resolve(cached);
            }
          } catch (_) {}

          if (!token) return Promise.resolve(null);

          var headers = { "Authorization": "Bearer " + token };
          if (brandId) headers["x-brand-id"] = brandId;

          return fetch("/api/storefront/stores", { headers: headers })
            .then(function (response) { return response.json().catch(function () { return {}; }); })
            .then(function (payload) {
              var stores = Array.isArray(payload && payload.stores) ? payload.stores : [];
              var store = stores[0] || null;
              if (!store) return null;
              var normalized = {
                id: String(store.id || ""),
                slug: String(store.slug || "").trim(),
                name: String(store.name || "").trim(),
                brand_id: brandId,
              };
              try { sessionStorage.setItem(cacheKey, JSON.stringify(normalized)); } catch (_) {}
              return normalized;
            })
            .catch(function () { return null; });
        }

        function buildCatalogUrlForStore(store) {
          var slug = store && store.slug ? String(store.slug).trim() : "";
          var brandId = store && store.brand_id ? String(store.brand_id).trim() : "";
          var target = slug ? "/catalogo/" + encodeURIComponent(slug) : "/catalogo";
          if (brandId) {
            target += (target.indexOf("?") >= 0 ? "&" : "?") + "brand_id=" + encodeURIComponent(brandId);
          }
          return target;
        }

        function openActiveCatalogWindow() {
          return resolveActiveStorefront().then(function (store) {
            var slug = store && store.slug ? String(store.slug).trim() : "";
            var brandId = store && store.brand_id ? String(store.brand_id).trim() : "";
            if (!slug) {
              try {
                var brandCtx = window.__brandContext || window.__brand || {};
                slug = String(brandCtx.store_slug || brandCtx.storefront_slug || "").trim();
                brandId = brandId || String(brandCtx.brand_id || brandCtx.id || "").trim();
              } catch (_) {}
            }
            var target = buildCatalogUrlForStore({ slug: slug, brand_id: brandId });
            window.open(target, "_blank");
            return target;
          });
        }

              var hdrs = _hdrs(); hdrs["Content-Type"] = "application/json";

                  alertEl.style.display = "block";

              .finally(function() {
                btn.disabled = false; btn.textContent = "Salvar configurações";
              });
            });
          }

          inputEmail.placeholder = "Email do gerente";

          grid.appendChild(inputName);
          grid.appendChild(inputEmail);

          refreshButton.type = "button";
          refreshButton.className = "btn-secondary";
          refreshButton.textContent = "Atualizar lista";

          actions.appendChild(createButton);
          actions.appendChild(refreshButton);

          const feedback = document.createElement("p");
          feedback.className = "stock-access-feedback";

          const list = document.createElement("div");
          list.className = "stock-access-list";

          const loadList = async () => {
            const response = await fetch(`/api/auth/stock-access?brand_id=${encodeURIComponent(activeBrandId)}`, {
              headers: {
                Authorization: `Bearer ${token}`,
                "x-brand-id": activeBrandId,
              },
            });
            const payload = await response.json().catch(() => ({}));

            if (!response.ok || !payload.success) {
              feedback.textContent = payload.error || "Não foi possível listar acessos de estoque.";
              return;
            }

            const items = Array.isArray(payload.credentials) ? payload.credentials : [];
            list.innerHTML = items.length
              ? items
                  .map((item) => {
                    const loginRef = String(item.brand_slug || item.brand_id || activeBrandId || '').trim();
                    const loginUrl = `${window.location.origin}/app-estoque?brand=${encodeURIComponent(loginRef)}`;
                    return `
                      <article class="stock-access-item">
                        <strong>${String(item.manager_name || "Gerente")}</strong>
                        <span>Email: ${String(item.email || "")}</span>
                        <span>Credencial: ${String(item.credential_type || "estoque")}</span>
                        <span>Status: ${item.is_active ? "ativo" : "inativo"}</span>
                        <span>Login: ${loginUrl}</span>
                      </article>
                    `;
                  })
                  .join("")
              : "<article class=\"stock-access-item\">Nenhum acesso cadastrado ainda.</article>";

            feedback.textContent = `${items.length} acesso(s) de estoque cadastrado(s).`;
          };

          createButton.addEventListener("click", async () => {
            const name = String(inputName.value || "").trim();
            const email = String(inputEmail.value || "").trim();
            const password = String(inputPassword.value || "").trim();

            if (!email || !password) {
              feedback.textContent = "Email e senha são obrigatórios.";
              return;
            }

            createButton.disabled = true;
            createButton.textContent = "Criando...";

            try {
              const response = await fetch("/api/auth/stock-access", {
                method: "POST",
                headers: {
                  Authorization: `Bearer ${token}`,
                  "Content-Type": "application/json",
                  "x-brand-id": activeBrandId,
                },
                body: JSON.stringify({
                  name,
                  email,
                  password,
                  brand_id: activeBrandId,
                }),
              });

              const payload = await response.json().catch(() => ({}));
              if (!response.ok || !payload.success) {
                feedback.textContent = payload.error || "Falha ao criar acesso.";
                return;
              }

              const loginUrl = `${window.location.origin}${String(payload?.credential?.login_url || `/app-estoque?brand=${encodeURIComponent(activeBrandId)}`)}`;
              feedback.textContent = `Acesso criado com sucesso. Envie este link ao gerente: ${loginUrl}`;
              inputPassword.value = "";
              await loadList();
            } finally {
              createButton.disabled = false;
              createButton.textContent = "Criar acesso estoque";
            }
          });

          refreshButton.addEventListener("click", () => {
            loadList().catch(() => {
              feedback.textContent = "Falha ao atualizar lista.";
            });
          });

          card.appendChild(title);
          card.appendChild(helper);
          card.appendChild(grid);
          card.appendChild(actions);
          card.appendChild(feedback);
          card.appendChild(list);

          parent.appendChild(card);
          loadList().catch(() => {
            feedback.textContent = "Falha ao carregar acessos de estoque.";
          });
        }

          var domainButton = existingButton;

          var nativeLinks = Array.from(railNav.querySelectorAll(".lojas-rail-link")).filter(function (link) {
            return link !== domainButton;
          });
          var nativePanels = Array.from(workspace.querySelectorAll(".lojas-tab-panel")).filter(function (panel) {
            return panel !== domainPanel;
          });

          function restoreNativePanels() {
            nativePanels.forEach(function (panel) {
              if (!(panel instanceof HTMLElement)) return;
              panel.style.display = "";
            });
            domainPanel.style.display = "none";
            domainButton.classList.remove("active");

          function activateDomainPanel() {
            nativePanels.forEach(function (panel) {
              if (!(panel instanceof HTMLElement)) return;
              panel.style.display = "none";
            });
            Array.from(railNav.querySelectorAll(".lojas-rail-link")).forEach(function (link) {
              link.classList.remove("active");

            domainPanel.style.display = "block";

            domainButton.dataset.domainBound = "1";
            domainButton.addEventListener("click", function () {
              activateDomainPanel();
            });
            nativeLinks.forEach(function (link) {
              if (!(link instanceof HTMLButtonElement) || link.dataset.domainRestoreBound === "1") return;
              link.dataset.domainRestoreBound = "1";
              link.addEventListener("click", function () {
                restoreNativePanels();
              });

          if (domainPanel.dataset.domainReady === "1") return;
          domainPanel.dataset.domainReady = "1";

          var TOKEN_KEY = "lead-system-token";

          var brandId = String(localStorage.getItem(ACTIVE_BRAND_KEY) || localStorage.getItem("leadcapture_brand_id") || "").trim();
          var state = { storeId: "", storeSlug: "", storeName: "", domains: [] };

          var instructions = domainPanel.querySelector('[data-role="instructions"]');
          var publicUrl = domainPanel.querySelector('[data-role="public-url"]');

          function api(path, options) {
            options = options || {};
            var headers = options.headers || {};
            headers["Authorization"] = "Bearer " + token;
            if (brandId) headers["x-brand-id"] = brandId;
            if (options.body && !headers["Content-Type"]) headers["Content-Type"] = "application/json";
            return fetch(path, {
              method: options.method || "GET",
              headers: headers,
              body: options.body ? JSON.stringify(options.body) : undefined,
            }).then(function (response) {
              return response.json().catch(function () { return {}; }).then(function (payload) {
                if (!response.ok || payload.success === false) {
                  throw new Error(payload.error || "Falha na requisição.");
                }
                return payload;
              });
            });
          }

          function escapeHtml(value) {
            return String(value || "")
              .replace(/&/g, "&amp;")
              .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;")
              .replace(/\"/g, "&quot;")
              .replace(/'/g, "&#39;");
          }

          function copyText(value) {
            if (!navigator.clipboard || !value) return Promise.reject(new Error("Clipboard indisponível"));
            return navigator.clipboard.writeText(value);
          }

          function setFeedback(message, tone) {
            if (!(feedback instanceof HTMLElement)) return;
            feedback.textContent = message || "";
            feedback.setAttribute("data-tone", tone || "neutral");
          }

          function renderPublicUrl() {
            if (!(publicUrl instanceof HTMLElement)) return;
            if (!state.storeSlug) {

            publicUrl.innerHTML =
              '<span>URL atual:</span>' +
              '<a href="/catalogo/' + encodeURIComponent(state.storeSlug) + '" target="_blank" rel="noreferrer">' +
              window.location.origin + '/catalogo/' + state.storeSlug +
              '</a>';
          }

          function renderInstructions(payload) {
            if (!(instructions instanceof HTMLElement)) return;
            if (!payload || !payload.instructions) {
              instructions.innerHTML = "Selecione um domínio para ver os registros DNS.";
              return;
            }
            var info = payload.instructions;
            var verify = info.verification || {};
            var conn = info.connection || {};
            instructions.innerHTML =
              '<div class="loja-domain-dns-block">' +
                '<strong>1. Verifique a propriedade</strong>' +
                '<div class="loja-domain-dns-row"><span>Tipo</span><code>TXT</code></div>' +
                '<div class="loja-domain-dns-row"><span>Host</span><code>' + escapeHtml(verify.host || "") + '</code><button type="button" class="loja-domain-copy" data-copy="' + escapeHtml(verify.host || "") + '">Copiar</button></div>' +
                '<div class="loja-domain-dns-row"><span>Valor</span><code>' + escapeHtml(verify.value || "") + '</code><button type="button" class="loja-domain-copy" data-copy="' + escapeHtml(verify.value || "") + '">Copiar</button></div>' +
              '</div>' +
              '<div class="loja-domain-dns-block">' +
                '<strong>2. Aponte o domínio</strong>' +
                '<div class="loja-domain-dns-row"><span>Tipo</span><code>' + escapeHtml(conn.type || "TXT_ONLY") + '</code></div>' +
                '<div class="loja-domain-dns-row"><span>Host</span><code>' + escapeHtml(conn.host || "@") + '</code></div>' +
                '<div class="loja-domain-dns-row"><span>Destino</span><code>' + escapeHtml(conn.target || "Seu servidor público") + '</code>' + (conn.target ? '<button type="button" class="loja-domain-copy" data-copy="' + escapeHtml(conn.target) + '">Copiar</button>' : '') + '</div>' +
                '<p>' + escapeHtml(conn.note || "") + '</p>' +
              '</div>' +
              (payload.checks ?
                '<div class="loja-domain-verify-state">' +
                  '<span class="loja-domain-pill ' + (payload.verified ? 'is-ok' : 'is-warn') + '">' + (payload.verified ? 'Verificado' : 'Pendente') + '</span>' +
                  '<span>TXT: ' + (payload.checks.txt_verified ? 'ok' : 'pendente') + '</span>' +
                  '<span>CNAME: ' + (payload.checks.cname_verified ? 'ok' : 'não detectado') + '</span>' +
                  '<span>A: ' + (payload.checks.a_resolved ? 'resolvido' : 'não detectado') + '</span>' +
                '</div>' : '') ;
          }

          function renderDomains() {
            if (!(list instanceof HTMLElement)) return;
            var items = Array.isArray(state.domains) ? state.domains : [];
            if (!items.length) {
              list.innerHTML = '<article class="loja-domain-item empty">Nenhum domínio cadastrado ainda.</article>';
              return;
            }
            list.innerHTML = items.map(function (item) {
              var domain = String(item.domain || "");
              var status = String(item.verification_status || "pending");
              return '' +
                '<article class="loja-domain-item" data-domain="' + escapeHtml(domain) + '">' +
                  '<div class="loja-domain-item-main">' +
                    '<div class="loja-domain-item-title">' + escapeHtml(domain) + (item.is_primary ? ' <span class="loja-domain-pill is-primary">principal</span>' : '') + '</div>' +
                    '<div class="loja-domain-item-meta">' +
                      '<span class="loja-domain-pill is-' + escapeHtml(status) + '">' + escapeHtml(status) + '</span>' +
                      '<a href="https://' + escapeHtml(domain) + '" target="_blank" rel="noreferrer">abrir</a>' +
                    '</div>' +
                  '</div>' +
                  '<div class="loja-domain-item-actions">' +
                    '<button type="button" class="btn-secondary" data-action="instructions">DNS</button>' +
                    '<button type="button" class="btn-secondary" data-action="verify">Verificar</button>' +
                    (item.is_primary ? '' : '<button type="button" class="btn-secondary" data-action="primary">Definir principal</button>') +
                    '<button type="button" class="btn-secondary danger" data-action="delete">Remover</button>' +
                  '</div>' +
                '</article>';
            }).join("");
          }

          function loadDomains() {
            if (!state.storeId) return Promise.resolve();
            if (list) list.innerHTML = 'Carregando domínios...';
            return api('/api/storefront/stores/' + encodeURIComponent(state.storeId) + '/domains')
              .then(function (payload) {
                state.domains = Array.isArray(payload.domains) ? payload.domains : [];
                renderDomains();
              })
              .catch(function (error) {
                if (list) list.innerHTML = '<article class="loja-domain-item empty">' + escapeHtml(error.message || 'Falha ao carregar domínios.') + '</article>';
              });
          }

          function loadStore() {
            if (!token) {
              setFeedback("Faça login novamente para configurar domínios.", "danger");
              return Promise.resolve();
            }
            return api('/api/storefront/stores')
              .then(function (payload) {
                var stores = Array.isArray(payload.stores) ? payload.stores : [];
                var store = stores[0] || null;
                if (!store) throw new Error('Nenhuma loja encontrada para a marca ativa.');
                state.storeId = String(store.id || '');
                state.storeSlug = String(store.slug || '');
                state.storeName = String(store.name || '');
                renderPublicUrl();
                return loadDomains();
              })
              .catch(function (error) {
                setFeedback(error.message || 'Falha ao carregar a loja.', 'danger');
              });
          }

          if (saveButton instanceof HTMLButtonElement) {
            saveButton.addEventListener('click', function () {
              var domain = String(input && input.value || '').trim();
              if (!domain) {
                setFeedback('Informe o domínio que deseja conectar.', 'danger');
                return;
              }
              saveButton.disabled = true;
              saveButton.textContent = 'Salvando...';
              api('/api/storefront/stores/' + encodeURIComponent(state.storeId) + '/domains', {
                method: 'POST',
                body: { domain: domain, is_primary: true }
              })
                .then(function () {
                  if (input) input.value = '';
                  setFeedback('Domínio salvo. Configure os registros DNS e clique em verificar.', 'success');
                  return loadDomains().then(function () {
                    return api('/api/storefront/stores/' + encodeURIComponent(state.storeId) + '/domains/' + encodeURIComponent(domain) + '/instructions');
                  }).then(renderInstructions);
                })
                .catch(function (error) {
                  setFeedback(error.message || 'Não foi possível salvar o domínio.', 'danger');
                })
                .finally(function () {
                  saveButton.disabled = false;
                  saveButton.textContent = 'Salvar domínio';
                });
            });
          }

          if (refreshButton instanceof HTMLButtonElement) {
            refreshButton.addEventListener('click', function () {
              loadDomains();
            });
          }

          if (instructions instanceof HTMLElement) {
            instructions.addEventListener('click', function (event) {
              var target = event.target;
              if (!(target instanceof HTMLButtonElement)) return;
              var value = String(target.getAttribute('data-copy') || '').trim();
              copyText(value)
                .then(function () { setFeedback('Registro copiado para a área de transferência.', 'success'); })
                .catch(function () { setFeedback('Não foi possível copiar automaticamente.', 'danger'); });
            });
          }

          if (list instanceof HTMLElement) {
            list.addEventListener('click', function (event) {
              var target = event.target;
              if (!(target instanceof HTMLButtonElement)) return;
              var action = String(target.getAttribute('data-action') || '');
              var item = target.closest('.loja-domain-item');
              var domain = String(item && item.getAttribute('data-domain') || '').trim();
              if (!domain || !state.storeId) return;

              if (action === 'instructions') {
                api('/api/storefront/stores/' + encodeURIComponent(state.storeId) + '/domains/' + encodeURIComponent(domain) + '/instructions')
                  .then(renderInstructions)
                  .catch(function (error) { setFeedback(error.message || 'Falha ao carregar instruções.', 'danger'); });
                return;
              }

              if (action === 'verify') {
                target.disabled = true;
                target.textContent = 'Verificando...';
                api('/api/storefront/stores/' + encodeURIComponent(state.storeId) + '/domains/' + encodeURIComponent(domain) + '/verify', { method: 'POST' })
                  .then(function (payload) {
                    renderInstructions(payload);
                    setFeedback(payload.verified ? 'Domínio verificado com sucesso.' : 'TXT ainda não encontrado. Aguarde a propagação DNS.', payload.verified ? 'success' : 'warn');
                    return loadDomains();
                  })
                  .catch(function (error) { setFeedback(error.message || 'Falha ao verificar domínio.', 'danger'); })
                  .finally(function () {
                    target.disabled = false;
                    target.textContent = 'Verificar';
                  });
                return;
              }

              if (action === 'primary') {
                api('/api/storefront/stores/' + encodeURIComponent(state.storeId) + '/domains/' + encodeURIComponent(domain) + '/primary', { method: 'PATCH' })
                  .then(function () {
                    setFeedback('Domínio principal atualizado.', 'success');
                    return loadDomains();
                  })
                  .catch(function (error) { setFeedback(error.message || 'Falha ao definir domínio principal.', 'danger'); });
                return;
              }

              if (action === 'delete') {
                if (!window.confirm('Remover o domínio ' + domain + '?')) return;
                api('/api/storefront/stores/' + encodeURIComponent(state.storeId) + '/domains/' + encodeURIComponent(domain), { method: 'DELETE' })
                  .then(function () {
                    renderInstructions(null);
                    setFeedback('Domínio removido.', 'success');
                    return loadDomains();
                  })
                  .catch(function (error) { setFeedback(error.message || 'Falha ao remover domínio.', 'danger'); });
              }
            });
          }

          loadStore();
        }

        function enhanceLeadCaptureModal() {
          const normalizeKey = function (value) {
            return String(value || "")
              .normalize("NFD")
              .replace(/[\u0300-\u036f]/g, "")
              .trim()
              .toLowerCase();
          };

          const escapeHtml = function (value) {
            return String(value || "")
              .replace(/&/g, "&amp;")
              .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;")
              .replace(/\"/g, "&quot;")
              .replace(/'/g, "&#39;");
          };

          const modals = document.querySelectorAll("article.lead-captured-detail-modal");
          modals.forEach((modal) => {
            if (!(modal instanceof HTMLElement)) return;
            if (modal.dataset.captureEnhanced === "1") return;

            const grid = modal.querySelector(".lead-captured-detail-grid");
            if (!(grid instanceof HTMLElement)) return;

            const entries = {};
            const cards = grid.querySelectorAll("article");
            cards.forEach((card) => {
              const label = card.querySelector("small");
              const value = card.querySelector("strong");
              const key = normalizeKey(label ? label.textContent : "");
              const text = String(value ? value.textContent : "").trim() || "-";
              if (key) entries[key] = text;
            });

            const phone = entries.telefone || "-";
            const whatsapp =
              entries.whatsapp ||
              entries["status de validacao"] ||
              entries["jid whatsapp"] ||
              (phone && phone !== "-" ? "Pendente validação" : "-");

            const status = entries.status || "-";
            const category = entries.categoria || "-";
            const rating = entries.avaliacao || "-";
            const address = entries.endereco || "Endereco nao informado";
            const website = entries.website || "-";
            const query = entries["query de captura"] || entries.query || "-";
            const whatsappJid = entries["jid whatsapp"] || "-";

            const renderCard = function (label, value, fullSpan) {
              const fullClass = fullSpan ? " full-span" : "";
              return [
                `<article class=\"lead-kv${fullClass}\">`,
                `<small>${escapeHtml(label)}</small>`,
                `<strong>${escapeHtml(value || "-")}</strong>`,
                `</article>`,
              ].join("");
            };

            grid.classList.add("lead-capture-grid-enhanced");
            grid.innerHTML = [
              renderCard("Telefone", phone, false),
              renderCard("WhatsApp", whatsapp, false),
              renderCard("Status de captura", status, false),
              renderCard("Categoria", category, false),
              renderCard("Avaliacao", rating, false),
              renderCard("JID WhatsApp", whatsappJid, false),
              renderCard("Endereco", address, true),
              renderCard("Website", website, true),
              renderCard("Query de captura", query, true),
            ].join("");

            const subtitle = modal.querySelector(".modal-header p");
            if (subtitle) {
              subtitle.textContent = "Análise completa para captura";
            }

            const actions = modal.querySelector(".modal-actions");
            if (actions) {
              actions.classList.add("lead-capture-actions");
            }

            modal.classList.add("lead-capture-ux");
            modal.dataset.captureEnhanced = "1";
          });
        }

                  toolsButton.setAttribute("aria-expanded", "false");
                }
              });

          return String(window.location.pathname || "").replace(/\/+$/, "") === pathname;

        function formatPercent(value) {
          var num = Number(value || 0);
          return (num * 100).toFixed(num > 0 && num < 0.1 ? 1 : 0) + "%";
        }

        function formatDateTime(value) {
          if (!value) return "—";
          var date = new Date(value);
          if (Number.isNaN(date.getTime())) return "—";
          return date.toLocaleString("pt-BR", { dateStyle: "short", timeStyle: "short" });
        }

          } catch (_) {
            window.location.href = path;
          }

          var token = getStoredAuthToken();
          if (!token) return Promise.resolve(null);
          var brandId = getStoredBrandId();
          var cacheKey = brandId || "default";
          var now = Date.now();
          var cache = window.__agentWorkspaceOverviewCache || {};
          var current = cache[cacheKey];

          if (!force && current && current.expiresAt > now && current.promise) {
            return current.promise;
          }

          var promise = fetch("/api/ai/workspace-overview", {
            headers: {
              "Authorization": "Bearer " + token,
              "x-brand-id": brandId
            }
          })
            .then(function(response) { return response.json().then(function(data) { return { ok: response.ok, data: data }; }); })
            .then(function(result) {
              if (!result.ok) {
                throw new Error((result.data && result.data.error) || "Falha ao carregar o cockpit do agente.");
              }
              return result.data && result.data.overview ? result.data.overview : null;
            })
            .catch(function(error) {
              if (current && current.data) return current.data;
              throw error;
            })
            .then(function(data) {
              cache[cacheKey] = {
                data: data,
                promise: Promise.resolve(data),
                expiresAt: Date.now() + 30000
              };
              window.__agentWorkspaceOverviewCache = cache;
              return data;
            });

          cache[cacheKey] = {
            data: current ? current.data : null,
            promise: promise,
            expiresAt: now + 30000
          };
          window.__agentWorkspaceOverviewCache = cache;
          return promise;
        }

        function lowerText(value) {

        function parseRequestJsonBody(body) {
          if (!body || typeof body !== "string") return null;
          try {
            return JSON.parse(body);
          } catch (_) {
            return null;
          }
        }

        function isLegacyProductRefineRequest(url) {
          try {
            var parsed = new URL(String(url || ""), window.location.origin);
            return /\/api\/products\/[^/?#]+\/refine$/i.test(parsed.pathname);
          } catch (_) {
            return /\/api\/products\/[^/?#]+\/refine$/i.test(String(url || ""));
          }
        }

        function ensureProductRefineInterception() {
          if (window.__legacyProductRefinePatchInstalled) return;
          if (typeof window.fetch !== "function") return;

          var nativeFetch = window.fetch.bind(window);
          window.__legacyProductRefinePatchInstalled = true;

          window.fetch = function(input, init) {
            var requestUrl = "";
            var method = "GET";

            if (typeof input === "string") {
              requestUrl = input;
            } else if (input && typeof input.url === "string") {
              requestUrl = input.url;
              method = input.method || method;
            }

            if (init && init.method) {
              method = init.method;
            }

            if (String(method || "GET").toUpperCase() === "POST" && isLegacyProductRefineRequest(requestUrl)) {
              var payload = parseRequestJsonBody(init && init.body);
              if (!payload || payload.mode !== "description_only") {
                window.__blockedLegacyProductRefineUntil = Date.now() + 2600;
                return Promise.resolve(new Response(JSON.stringify({
                  success: true,
                  refined: false,
                  already_refined: true,
                  product: null,
                  refinement: null,
                  blocked: true
                }), {
                  status: 200,
                  headers: { "Content-Type": "application/json" }
                }));
              }
            }

            return nativeFetch(input, init);
          };
        }

        function suppressBlockedProductRefineFeedback() {
          var until = Number(window.__blockedLegacyProductRefineUntil || 0);
          if (!until || Date.now() > until) return;

          document.querySelectorAll(".products-page *, .modal-window *").forEach(function(node) {
            if (!(node instanceof HTMLElement)) return;
            if (node.children.length > 2) return;
            var text = asText(node.textContent || "");
            if (!text) return;
            if (text === "Produto já estava refinado." || text === "Produto refinado com sucesso.") {
              node.style.display = "none";
              node.setAttribute("aria-hidden", "true");
            }
          });
        }

        function fieldMatchesHints(field, hints) {
          if (!(field instanceof HTMLElement)) return false;
          var haystack = [
            field.getAttribute("name"),
            field.getAttribute("placeholder"),
            field.getAttribute("aria-label"),
            field.id,
            field.dataset ? field.dataset.field : ""
          ].join(" ");
          haystack = lowerText(haystack);
          return hints.some(function(hint) {
            return haystack.indexOf(hint) !== -1;
          });
        }

        function findFieldByLabel(root, hints) {
          var labels = Array.from(root.querySelectorAll("label"));
          for (var i = 0; i < labels.length; i += 1) {
            var label = labels[i];
            var text = lowerText(label.textContent || "");
            var matched = hints.some(function(hint) { return text.indexOf(hint) !== -1; });
            if (!matched) continue;

            if (label.htmlFor) {
              var direct = document.getElementById(label.htmlFor);
              if (direct instanceof HTMLInputElement || direct instanceof HTMLTextAreaElement || direct instanceof HTMLSelectElement) {
                return direct;
              }
            }

            var nested = label.parentElement ? label.parentElement.querySelector("textarea, input, select") : null;
            if (nested instanceof HTMLInputElement || nested instanceof HTMLTextAreaElement || nested instanceof HTMLSelectElement) {
              return nested;
            }

            var sibling = label.nextElementSibling;
            while (sibling) {
              if (sibling instanceof HTMLInputElement || sibling instanceof HTMLTextAreaElement || sibling instanceof HTMLSelectElement) {
                return sibling;
              }
              var inside = sibling.querySelector ? sibling.querySelector("textarea, input, select") : null;
              if (inside instanceof HTMLInputElement || inside instanceof HTMLTextAreaElement || inside instanceof HTMLSelectElement) {
                return inside;
              }
              sibling = sibling.nextElementSibling;
            }
          }
          return null;
        }

        function findField(root, hints, selector) {
          var byLabel = findFieldByLabel(root, hints);
          if (byLabel) return byLabel;

          var fields = Array.from(root.querySelectorAll(selector || "textarea, input, select"));
          for (var i = 0; i < fields.length; i += 1) {
            if (fieldMatchesHints(fields[i], hints)) return fields[i];
          }
          return null;
        }

        function findProductDescriptionField(modal) {
          var field = findField(modal, ["descri"], "textarea, input[type='text']");
          if (field) return field;

          var textareas = Array.from(modal.querySelectorAll("textarea"));
          return textareas.length ? textareas[0] : null;
        }

        function findProductFieldGroup(field) {
          var current = field ? field.parentElement : null;
          while (current && current !== document.body) {
            if (current.querySelector("label") && current.contains(field)) return current;
            if (/field|group|form|stack|control/i.test(current.className || "")) return current;
            current = current.parentElement;
          }
          return field ? field.parentElement : null;
        }

        function findProductFieldLabel(group, field) {
          if (!group) return null;
          if (field && field.id) {
            var direct = group.querySelector('label[for="' + field.id.replace(/"/g, "") + '"]');
            if (direct) return direct;
          }
          return group.querySelector("label");
        }

        function getFieldValue(field) {
          if (!(field instanceof HTMLInputElement) && !(field instanceof HTMLTextAreaElement) && !(field instanceof HTMLSelectElement)) {
            return "";
          }
          return String(field.value || "").trim();
        }

        function getFieldNumberValue(field) {
          var value = getFieldValue(field).replace(/\./g, "").replace(",", ".");
          var num = Number(value);
          return Number.isFinite(num) ? num : null;
        }

        function setNativeFieldValue(field, value) {
          if (!field) return;
          var prototype = field instanceof HTMLTextAreaElement
            ? HTMLTextAreaElement.prototype
            : field instanceof HTMLInputElement
            ? HTMLInputElement.prototype
            : HTMLSelectElement.prototype;
          var descriptor = Object.getOwnPropertyDescriptor(prototype, "value");
          if (descriptor && typeof descriptor.set === "function") {
            descriptor.set.call(field, value);
          } else {
            field.value = value;
          }
        }

        function resolveVisibleProductModals() {
          return Array.from(document.querySelectorAll(".modal-window")).filter(function(modal) {

        function readProductModalContext(modal, descriptionField) {
          var nameField = findField(modal, ["nome", "produto"], "input[type='text'], input:not([type]), textarea");

          var imageField = modal.querySelector("img[src], .product-preview-image img[src], .product-image-preview img[src]");

          return {

            category: getFieldValue(categoryField),

            price: getFieldNumberValue(priceField),
