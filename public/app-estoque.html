<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App de Estoque • Login</title>
    <script src="/shared/loader.js" data-components="forms,buttons"></script>
    <style>
      /* ── Dark login theme overrides ── */
      body { background: #0f172a; color: #e2e8f0; min-height: 100vh; display: grid; place-items: center; padding: 18px; }
      .card { width: 100%; max-width: 430px; background: rgba(15,23,42,.92); border: 1px solid rgba(100,116,139,.45); border-radius: var(--radius-lg, 14px); padding: 16px; }
      .brand-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
      .brand-logo { width: 42px; height: 42px; border-radius: 10px; object-fit: cover; border: 1px solid #334155; background: #0b1220; }
      h1 { margin: 0 0 8px; font-size: 24px; }
      p { color: #94a3b8; margin: 0 0 14px; }
      form { display: grid; gap: 10px; }
      input { width: 100%; padding: 11px; border-radius: 10px; border: 1px solid #334155; background: #020617; color: #e2e8f0; }
      button { border: 0; border-radius: 10px; padding: 11px; background: var(--brand-secondary, #2563eb); color: #fff; font-weight: 700; cursor: pointer; }
      .muted { color: #94a3b8; font-size: 12px; margin-top: 10px; }
      .error { color: #fca5a5; font-size: 13px; min-height: 20px; }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="brand-head">
        <img id="brandLogo" class="brand-logo" alt="Brand" style="display:none" />
        <div>
          <h1 id="brandName">App de Estoque</h1>
        </div>
      </div>
      <p id="brandSubtitle">Acesso do gerente ao estoque e produtos</p>
      <form id="loginForm">
        <input id="email" type="email" placeholder="Email" required />
        <input id="password" type="password" placeholder="Senha" required />
        <button type="submit">Entrar</button>
      </form>
      <div id="error" class="error"></div>
      <div class="muted">Credencial: <strong>estoque</strong></div>
    </main>

    <script>
      (function () {
        const qs = new URLSearchParams(window.location.search);
        const brandRef = String(qs.get('brand') || '').trim();
        let brandId = '';

        const form = document.getElementById('loginForm');
        const errorEl = document.getElementById('error');
        const brandLogo = document.getElementById('brandLogo');
        const brandName = document.getElementById('brandName');
        const brandSubtitle = document.getElementById('brandSubtitle');

        async function bootstrapBrand() {
          if (!brandRef) {
            errorEl.textContent = 'Link inválido: brand não informada.';
            form.querySelector('button[type="submit"]').disabled = true;
            return;
          }

          const response = await fetch(`/api/auth/stock-brand?brand=${encodeURIComponent(brandRef)}`);
          const payload = await response.json().catch(() => ({}));

          if (!response.ok || !payload.success || !payload.brand?.id) {
            errorEl.textContent = payload.error || 'Brand não encontrada para acesso ao app de estoque.';
            form.querySelector('button[type="submit"]').disabled = true;
            return;
          }

          brandId = String(payload.brand.id || '').trim();
          const loadedName = String(payload.brand.name || '').trim();
          const loadedLogo = String(payload.brand.logo_url || '').trim();

          if (loadedName) {
            brandName.textContent = loadedName;
            brandSubtitle.textContent = `Acesso do gerente de produtos • ${loadedName}`;
            document.title = `${loadedName} • App de Estoque`;
          }
          if (loadedLogo) {
            brandLogo.src = loadedLogo;
            brandLogo.style.display = 'block';
          }
        }

        form.addEventListener('submit', async function (event) {
          event.preventDefault();
          errorEl.textContent = '';

          const email = String(document.getElementById('email').value || '').trim();
          const password = String(document.getElementById('password').value || '').trim();
          if (!brandId) {
            errorEl.textContent = 'Link inválido: brand não informada.';
            return;
          }

          const response = await fetch('/api/auth/stock-login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password, brand: brandRef }),
          });

          const payload = await response.json().catch(() => ({}));
          if (!response.ok || !payload.success) {
            errorEl.textContent = payload.error || 'Falha no login de estoque.';
            return;
          }

          const resolvedBrandId = String(payload?.user?.brand_id || brandId || '').trim();
          const resolvedBrandSlug = String(payload?.user?.brand_slug || '').trim();

          localStorage.setItem('lead-system-token-estoque', String(payload.token || ''));
          localStorage.setItem('lead-system:active-brand-id-estoque', resolvedBrandId);
          localStorage.setItem('lead-system:active-brand-ref-estoque', resolvedBrandSlug || resolvedBrandId || brandRef);
          window.location.href = `/app-estoque/painel?brand=${encodeURIComponent(resolvedBrandSlug || resolvedBrandId || brandRef)}`;
        });

        bootstrapBrand().catch(() => {
          errorEl.textContent = 'Falha ao validar brand do link.';
          form.querySelector('button[type="submit"]').disabled = true;
        });
      })();
    </script>
  </body>
</html>
