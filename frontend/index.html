<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#0a0a0a" id="pwa-theme-color" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LeadCapture" id="pwa-app-title" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="LeadCapture" id="pwa-app-name" />
    <meta name="description" content="Catálogo, pedidos e atendimento integrado." id="pwa-app-description" />
    <style>
      :root { color-scheme: light; }

      html {
        height: 100%;
        background: #f3f3f3;
      }

      html, body {
        margin: 0;
        padding: 0;
        min-height: 100%;
        min-height: 100dvh;
      }

      body.app-shell-loading {
        margin: 0;
        overflow: hidden;
        background: var(--boot-bg, #f3f3f3);
      }

      /* Splash ocupa 100% da viewport — evita metade branca / metade cinza */
      #app-splash {
        --splash-bg: #f3f3f3;
        --splash-fg: #171717;
        --splash-muted: #6b6b6b;
        --splash-tile: #0a0a0a;
        position: fixed;
        inset: 0;
        width: 100%;
        min-height: 100%;
        min-height: 100dvh;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 18px;
        background: var(--splash-bg);
        padding:
          env(safe-area-inset-top, 0px)
          env(safe-area-inset-right, 0px)
          env(safe-area-inset-bottom, 0px)
          env(safe-area-inset-left, 0px);
        box-sizing: border-box;
        opacity: 1;
        transition: opacity 240ms ease;
      }

      /* Cores por app — identidade na instalação e no boot */
      #app-splash[data-view='admin'] {
        --splash-bg: #f3f3f3;
        --splash-fg: #0a0a0a;
        --splash-tile: #0a0a0a;
      }
      #app-splash[data-view='store'] {
        --splash-bg: #f1f5f9;
        --splash-fg: #0f172a;
        --splash-tile: #0f172a;
      }
      #app-splash[data-view='stock'] {
        --splash-bg: #fffbeb;
        --splash-fg: #78350f;
        --splash-tile: #78350f;
      }
      #app-splash[data-view='affiliate'] {
        --splash-bg: #ecfdf5;
        --splash-fg: #14532d;
        --splash-tile: #14532d;
      }
      #app-splash[data-view='mob'] {
        --splash-bg: #f5f5f5;
        --splash-fg: #171717;
        --splash-tile: #171717;
      }

      #app-splash[data-state='closing'] {
        opacity: 0;
        pointer-events: none;
      }

      .app-splash__tile {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        background: var(--splash-tile);
        display: grid;
        place-items: center;
        box-shadow: 0 8px 28px rgba(15, 23, 42, 0.12);
        opacity: 0;
        transform: scale(0.96);
        animation: splashFadeIn 280ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      .app-splash__logo {
        width: 44px;
        height: 44px;
        border-radius: 10px;
        object-fit: contain;
      }

      .app-splash__brand {
        margin: 0;
        color: var(--splash-fg);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', system-ui, sans-serif;
        font-size: 17px;
        font-weight: 600;
        letter-spacing: -0.01em;
        opacity: 0;
        animation: splashFadeIn 280ms cubic-bezier(0.16, 1, 0.3, 1) 60ms forwards;
      }

      .app-splash__hint {
        margin: 0;
        color: var(--splash-muted);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        font-size: 12px;
        font-weight: 500;
        opacity: 0;
        animation: splashFadeIn 280ms cubic-bezier(0.16, 1, 0.3, 1) 100ms forwards;
      }

      @keyframes splashFadeIn {
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .app-splash__tile,
        .app-splash__brand,
        .app-splash__hint {
          animation: none;
          opacity: 1;
          transform: none;
        }
      }
    </style>
    <script>
      (function () {
        var pathParts = window.location.pathname.split('/').filter(Boolean)
        var slug = ''
        var channel = 'catalogo'
        var firstPath = pathParts[0] || ''
        var host = (window.location.hostname || '').toLowerCase()
        var isPartnersGlobalHost =
          host === 'parceiros.leadcapture.online'
          || host === 'afiliados.leadcapture.online'
        var isMobHost = host === 'mob.leadcapture.online'
        // parceiros.{marca}.online (ex.: parceiros.alhopronto.online)
        var partnersBrandMatch = host.match(/^(?:parceiros|afiliados)\.([a-z0-9-]+)\./i)
        var partnersBrandSlug =
          partnersBrandMatch
          && partnersBrandMatch[1]
          && partnersBrandMatch[1] !== 'leadcapture'
            ? partnersBrandMatch[1]
            : ''
        var isPartnersHost = isPartnersGlobalHost || !!partnersBrandSlug
        var adminPaths = {
          admin: true, dashboard: true, login: true, leads: true, clientes: true,
          busca: true, mensagens: true, notificacoes: true, campanhas: true,
          automacoes: true, fluxos: true, habilidades: true, skills: true,
          criativos: true, creative: true, integracoes: true, galeria: true,
          'video-studio': true, produtos: true, pedidos: true, design: true,
          whatsapp: true, instagram: true, facebook: true, pagamentos: true,
          frete: true, dominio: true, agente: true, atendente: true,
          configuracoes: true, emails: true, 'provedores-ia': true,
          afiliados: true, cupons: true, avaliacoes: true,
          'tirar-pedido': true,
        }
        var splashView = 'store'
        var appKind = 'store'
        var surface = '' // partners = app global LeadCapture Parceiros

        if (isMobHost || firstPath === 'mob' || firstPath === 'rastreio') {
          // App do entregador (Lead Capture Mob)
          appKind = 'mob'
          splashView = 'mob'
          surface = 'mob'
        } else if (isPartnersGlobalHost || firstPath === 'parceiros') {
          // App de afiliados global — NUNCA painel admin
          appKind = 'affiliate'
          splashView = 'affiliate'
          surface = 'partners'
        } else if (partnersBrandSlug) {
          appKind = 'affiliate'
          splashView = 'affiliate'
          slug = partnersBrandSlug
        } else if ((pathParts[0] === 'catalogo' || pathParts[0] === 'loja') && pathParts[1]) {
          slug = decodeURIComponent(pathParts[1])
          channel = pathParts[0]
          splashView = 'store'
          appKind = 'store'
        } else if (pathParts[0] === 'central-afiliado') {
          if (pathParts[1]) slug = decodeURIComponent(pathParts[1])
          appKind = 'affiliate'
          splashView = 'affiliate'
        } else if (firstPath === 'app-estoque' || firstPath === 'inventario') {
          if (pathParts[1]) slug = decodeURIComponent(pathParts[1])
          appKind = 'stock'
          splashView = 'stock'
        } else if (adminPaths[firstPath] || firstPath === 'estoque') {
          // /estoque no admin é módulo, não app-estoque
          if (firstPath === 'estoque' && !pathParts[1]) {
            splashView = 'admin'
            appKind = 'admin'
          } else if (adminPaths[firstPath]) {
            splashView = 'admin'
            appKind = 'admin'
          }
        } else if (!firstPath || firstPath === 'inicio') {
          splashView = 'admin'
          appKind = 'admin'
        }

        var params = new URLSearchParams()
        params.set('app', appKind)
        if (slug) params.set('slug', slug)
        if (surface) params.set('surface', surface)
        if (appKind === 'store' && channel) params.set('channel', channel)

        var query = params.toString()
        var querySuffix = '?' + query
        var iconSuffix = querySuffix + '&size=192'
        var iconLargeSuffix = querySuffix + '&size=512'
        var splashIcon = '/pwa/icon' + iconSuffix

        var brandNames = {
          store: 'Catálogo',
          admin: 'LeadCapture',
          stock: 'Estoque',
          affiliate: surface === 'partners' ? 'LeadCapture Parceiros' : 'Afiliados',
          mob: 'Lead Capture Mob',
        }
        var themeColors = {
          store: '#0f82ff',
          admin: '#0a0a0a',
          stock: '#d97706',
          affiliate: '#16a34a',
          mob: '#171717',
        }
        var bootBgs = {
          store: '#f1f5f9',
          admin: '#f3f3f3',
          stock: '#fffbeb',
          affiliate: '#ecfdf5',
          mob: '#f5f5f5',
        }

        function appendLink(id, rel, href, sizes, type) {
          var existing = document.getElementById(id)
          if (existing) existing.remove()
          var link = document.createElement('link')
          link.id = id
          link.rel = rel
          link.href = href
          if (sizes) link.sizes = sizes
          if (type) link.type = type
          document.head.appendChild(link)
        }

        appendLink('pwa-manifest', 'manifest', '/pwa/manifest.webmanifest' + querySuffix)
        appendLink('pwa-apple-touch-icon', 'apple-touch-icon', '/pwa/icon' + iconSuffix, '192x192')
        appendLink('pwa-favicon-192', 'icon', '/pwa/icon' + iconSuffix, '192x192')
        appendLink('pwa-favicon-512', 'icon', '/pwa/icon' + iconLargeSuffix, '512x512')

        var titleEl = document.getElementById('pwa-app-title')
        var nameEl = document.getElementById('pwa-app-name')
        var themeEl = document.getElementById('pwa-theme-color')
        var brandLabel = brandNames[splashView] || 'LeadCapture'
        if (titleEl) titleEl.setAttribute('content', brandLabel)
        if (nameEl) nameEl.setAttribute('content', brandLabel)
        if (themeEl) themeEl.setAttribute('content', themeColors[splashView] || '#0a0a0a')
        document.documentElement.style.setProperty('--boot-bg', bootBgs[splashView] || '#f3f3f3')

        window.__LC_SPLASH__ = {
          startedAt: Date.now(),
          dismiss: function () {
            var splash = document.getElementById('app-splash')
            if (!splash || splash.dataset.state === 'closing') return
            splash.dataset.state = 'closing'
            document.body.classList.remove('app-shell-loading')
            window.setTimeout(function () {
              if (splash && splash.parentNode) splash.remove()
            }, 260)
          },
        }

        window.__LC_SPLASH_CONFIG__ = {
          view: splashView,
          app: appKind,
          icon: splashIcon,
          brand: brandLabel,
          themeColor: themeColors[splashView] || '#0a0a0a',
        }

        window.__LC_PWA_IDENTITY__ = {
          app: appKind,
          slug: slug || null,
          surface: surface || null,
          name: brandLabel,
          themeColor: themeColors[splashView] || '#0a0a0a',
          iconUrl: splashIcon,
        }
      })()
    </script>
    <title>LeadCapture</title>
  </head>
  <body class="app-shell-loading">
    <div id="app-splash" aria-hidden="true">
      <div class="app-splash__tile">
        <img id="app-splash-logo" class="app-splash__logo" src="/brand-mark.svg" alt="" width="44" height="44" />
      </div>
      <p id="app-splash-brand" class="app-splash__brand">LeadCapture</p>
      <p class="app-splash__hint">Carregando…</p>
    </div>
    <script>
      (function () {
        var config = window.__LC_SPLASH_CONFIG__
        var splash = document.getElementById('app-splash')
        if (!config || !splash) return
        splash.dataset.view = config.view
        document.body.style.background = getComputedStyle(splash).getPropertyValue('--splash-bg') || '#f3f3f3'
        var logo = document.getElementById('app-splash-logo')
        if (logo) logo.src = config.icon
        var brand = document.getElementById('app-splash-brand')
        if (brand) brand.textContent = config.brand
        document.title = config.brand
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
