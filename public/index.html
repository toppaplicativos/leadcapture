        async function requestDescriptionPreview(modal, descriptionField, trigger, status) {
          var token = getStoredAuthToken();
          if (!token) {
            status.textContent = "Sessão não encontrada para usar a IA.";
            status.dataset.state = "error";
            return;
          }

          var context = readProductModalContext(modal, descriptionField);
          if (!context.description) {
            status.textContent = "Preencha a descrição atual antes de otimizar.";
            status.dataset.state = "error";
            descriptionField.focus();
            return;
          }

          trigger.disabled = true;
          trigger.classList.add("is-loading");
          status.textContent = "Gerando uma descrição mais completa...";
          status.dataset.state = "loading";

          try {
            var response = await fetch("/api/products/refine-description-preview", {
              method: "POST",
              headers: {
                "Authorization": "Bearer " + token,
                "x-brand-id": getStoredBrandId(),
                "Content-Type": "application/json"
              },
              body: JSON.stringify(context)
            });
            var data = await response.json();
            if (!response.ok) {
              throw new Error((data && data.error) || "Falha ao otimizar a descrição.");
            }

            var nextDescription = String((data && data.description) || "").trim();
            if (!nextDescription) {
              throw new Error("A IA não retornou uma descrição válida.");
            }

            setNativeFieldValue(descriptionField, nextDescription);
            descriptionField.dispatchEvent(new Event("input", { bubbles: true }));
            descriptionField.dispatchEvent(new Event("change", { bubbles: true }));
            descriptionField.focus();
            status.textContent = "Descrição otimizada. Revise e salve quando quiser.";
            status.dataset.state = "success";
          } catch (error) {
            status.textContent = error && error.message ? error.message : "Não foi possível otimizar agora.";
            status.dataset.state = "error";
          } finally {
            trigger.disabled = false;
            trigger.classList.remove("is-loading");
          }
        }

              basicsBody: basicsCard.body,

              contentBody: contentCard.body,
            };

            galleryInput.addEventListener("change", async function() {
              var files = Array.from(galleryInput.files || []);
              if (!files.length) return;

              var productId = extractProductIdFromModal(modal);
              if (!productId) {
                state.refs.galleryStatus.textContent = "Salve o produto primeiro para liberar a galeria de fotos.";
                state.refs.galleryStatus.dataset.state = "warning";
                galleryInput.value = "";
                return;
              }

              var headers = getProductAuthHeaders(false);
              if (!headers) {
                state.refs.galleryStatus.textContent = "Sessão não encontrada para enviar imagens.";
                state.refs.galleryStatus.dataset.state = "error";
                galleryInput.value = "";
                return;
              }

              state.busy = true;
              state.refs.galleryAddButton.disabled = true;
              state.refs.galleryStatus.textContent = "Enviando fotos para a galeria...";
              state.refs.galleryStatus.dataset.state = "loading";

              try {
                var formData = new FormData();
                files.forEach(function(file) {
                  formData.append("images", file);
                });

                var response = await fetch("/api/products/" + encodeURIComponent(productId) + "/gallery-images/upload", {
                  method: "POST",
                  headers: headers,
                  body: formData,
                });
                var data = await response.json();
                if (!response.ok) {
                  throw new Error((data && data.error) || "Falha ao enviar fotos.");
                }

                state.images = Array.isArray(data.images) ? data.images : [];
                state.coverImage = String((data && data.coverImage) || state.coverImage || "").trim();
                state.refs.galleryStatus.textContent = files.length > 1
                  ? "Fotos adicionadas com sucesso."
                  : "Foto adicionada com sucesso.";
                state.refs.galleryStatus.dataset.state = "success";
                renderProductGallery(modal);
              } catch (error) {
                state.refs.galleryStatus.textContent = error && error.message ? error.message : "Falha ao enviar fotos.";
                state.refs.galleryStatus.dataset.state = "error";
              } finally {
                state.busy = false;
                state.refs.galleryAddButton.disabled = false;
                galleryInput.value = "";
              }
            });
          }

          var coverInputGroup = resolveProductFieldGroup(form, ["imagem do produto", "imagem"], "input[type='file']");
          var coverManagerGroup = form.querySelector(".product-cover-manager");
          var previewGroup = form.querySelector(".product-image-preview-wrap");
          var dynamicPanel = form.querySelector(".product-dynamic-covers-panel");
          var nameGroup = resolveProductFieldGroup(form, ["nome"], "input[type='text'], input:not([type])");
          var categoryGroup = resolveProductFieldGroup(form, ["categoria"], "input[type='text'], input:not([type]), select");
          var unitGroup = resolveProductFieldGroup(form, ["unidade"], "input[type='text'], input:not([type]), select");
          var activeGroup = resolveProductFieldGroup(form, ["ativo"], "input[type='checkbox'], select");
          var priceGroup = resolveProductFieldGroup(form, ["preço", "preco", "valor"], "input[type='text'], input[type='number'], input:not([type])");
          var promoGroup = resolveProductFieldGroup(form, ["promo", "oferta"], "input[type='text'], input[type='number'], input:not([type])");
          var descriptionGroup = findProductFieldGroup(findProductDescriptionField(form));
          var featuresGroup = resolveProductFieldGroup(form, ["features", "destaques"], "input[type='text'], textarea");

          moveNodeToContainer(coverInputGroup, state.refs.mediaBody);
          moveNodeToContainer(coverManagerGroup, state.refs.mediaBody);
          moveNodeToContainer(previewGroup, state.refs.mediaBody);
          moveNodeToContainer(nameGroup, state.refs.basicsBody);
          moveNodeToContainer(categoryGroup, state.refs.basicsBody);
          moveNodeToContainer(unitGroup, state.refs.basicsBody);
          moveNodeToContainer(activeGroup, state.refs.basicsBody);
          moveNodeToContainer(priceGroup, state.refs.pricingBody);
          moveNodeToContainer(promoGroup, state.refs.pricingBody);
          moveNodeToContainer(descriptionGroup, state.refs.contentBody);
          moveNodeToContainer(featuresGroup, state.refs.contentBody);

          if (dynamicPanel instanceof HTMLElement) {
            dynamicPanel.style.display = "none";
            dynamicPanel.setAttribute("aria-hidden", "true");
          }

          state.productId = extractProductIdFromModal(modal);
          return state;
        }

        function updateProductCoverPreview(modal, imageUrl) {
          var state = modal.__productManagerRuntime;
          if (!state) return;

          var previewImg = modal.querySelector(".product-image-preview, .product-card-image, .product-image-preview-wrap img");
          if (previewImg instanceof HTMLImageElement && imageUrl) {
            previewImg.src = imageUrl;
          }
        }

        function renderProductGallery(modal) {
          var state = ensureProductManagerWorkspace(modal);
          if (!state || !state.refs.galleryGrid) return;

          var grid = state.refs.galleryGrid;
          grid.innerHTML = "";

          if (!state.productId) {
            var pending = document.createElement("div");
            pending.className = "pm-gallery-empty";
            pending.textContent = "Salve o produto para adicionar fotos extras além da capa principal.";
            grid.appendChild(pending);
            return;
          }

          if (!Array.isArray(state.images) || !state.images.length) {
            var empty = document.createElement("div");
            empty.className = "pm-gallery-empty";
            empty.textContent = "Nenhuma foto extra cadastrada. Use a galeria para enriquecer a apresentação do produto.";
            grid.appendChild(empty);
            return;
          }

          state.images.forEach(function(imageUrl, index) {
            var item = document.createElement("article");
            item.className = "pm-gallery-item";

            var image = document.createElement("img");
            image.src = imageUrl;
            image.alt = "Foto do produto " + (index + 1);

            var footer = document.createElement("div");
            footer.className = "pm-gallery-item-footer";

            var badge = document.createElement("span");
            badge.className = "pm-gallery-badge" + (state.coverImage === imageUrl ? " is-cover" : "");
            badge.textContent = state.coverImage === imageUrl ? "Capa atual" : "Foto extra";

            var actions = document.createElement("div");
            actions.className = "pm-gallery-item-actions";

            var coverButton = document.createElement("button");
            coverButton.type = "button";
            coverButton.className = "btn-secondary";
            coverButton.textContent = state.coverImage === imageUrl ? "Em uso" : "Usar como capa";
            coverButton.disabled = state.busy || state.coverImage === imageUrl;

            coverButton.addEventListener("click", async function() {
              var headers = getProductAuthHeaders(true);
              if (!headers) return;
              state.busy = true;
              state.refs.galleryStatus.textContent = "Atualizando capa principal...";
              state.refs.galleryStatus.dataset.state = "loading";
              renderProductGallery(modal);
              try {
                var response = await fetch("/api/products/" + encodeURIComponent(state.productId), {
                  method: "PUT",
                  headers: headers,
                  body: JSON.stringify({ imageUrl: imageUrl }),
                });
                var data = await response.json();
                if (!response.ok) {
                  throw new Error((data && data.error) || "Falha ao definir a capa.");
                }
                state.coverImage = String((data && data.product && data.product.imageUrl) || imageUrl || "").trim();
                updateProductCoverPreview(modal, state.coverImage);
                state.refs.galleryStatus.textContent = "Capa principal atualizada.";
                state.refs.galleryStatus.dataset.state = "success";
              } catch (error) {
                state.refs.galleryStatus.textContent = error && error.message ? error.message : "Falha ao atualizar a capa.";
                state.refs.galleryStatus.dataset.state = "error";
              } finally {
                state.busy = false;
                renderProductGallery(modal);
              }
            });

            var deleteButton = document.createElement("button");
            deleteButton.type = "button";
            deleteButton.className = "btn-danger";
            deleteButton.textContent = "Remover";
            deleteButton.disabled = state.busy;

            deleteButton.addEventListener("click", async function() {
              if (!window.confirm("Remover esta foto da galeria do produto?")) return;
              var headers = getProductAuthHeaders(false);
              if (!headers) return;
              state.busy = true;
              state.refs.galleryStatus.textContent = "Removendo foto...";
              state.refs.galleryStatus.dataset.state = "loading";
              renderProductGallery(modal);
              try {
                var response = await fetch("/api/products/" + encodeURIComponent(state.productId) + "/gallery-images/" + index, {
                  method: "DELETE",
                  headers: headers,
                });
                var data = await response.json();
                if (!response.ok) {
                  throw new Error((data && data.error) || "Falha ao remover a foto.");
                }
                state.images = Array.isArray(data.images) ? data.images : [];
                state.coverImage = String((data && data.coverImage) || state.coverImage || "").trim();
                state.refs.galleryStatus.textContent = "Foto removida da galeria.";
                state.refs.galleryStatus.dataset.state = "success";
              } catch (error) {
                state.refs.galleryStatus.textContent = error && error.message ? error.message : "Falha ao remover a foto.";
                state.refs.galleryStatus.dataset.state = "error";
              } finally {
                state.busy = false;
                renderProductGallery(modal);
              }
            });

            actions.appendChild(coverButton);
            actions.appendChild(deleteButton);
            footer.appendChild(badge);
            footer.appendChild(actions);
            item.appendChild(image);
            item.appendChild(footer);
            grid.appendChild(item);
          });
        }

        async function hydrateProductGallery(modal) {
          var state = ensureProductManagerWorkspace(modal);
          if (!state) return;

          if (!state.productId) {
            renderProductGallery(modal);
            return;
          }

          if (state.loadedFor === state.productId && !state.loading) {
            renderProductGallery(modal);
            return;
          }

          if (state.loading) return;
          state.loading = true;
          state.refs.galleryStatus.textContent = "Carregando galeria do produto...";
          state.refs.galleryStatus.dataset.state = "loading";

          try {
            var headers = getProductAuthHeaders(false);
            if (!headers) throw new Error("Sessão não encontrada para carregar a galeria.");

            var response = await fetch("/api/products/" + encodeURIComponent(state.productId) + "/gallery-images", {
              headers: headers,
            });
            var data = await response.json();
            if (!response.ok) {
              throw new Error((data && data.error) || "Falha ao carregar a galeria.");
            }

            state.images = Array.isArray(data.images) ? data.images : [];
            state.coverImage = String((data && data.coverImage) || "").trim();
            state.loadedFor = state.productId;
            state.refs.galleryStatus.textContent = state.images.length
              ? "Galeria pronta para gestão visual."
              : "Produto sem fotos extras no momento.";
            state.refs.galleryStatus.dataset.state = state.images.length ? "neutral" : "warning";
          } catch (error) {
            state.refs.galleryStatus.textContent = error && error.message ? error.message : "Falha ao carregar a galeria.";
            state.refs.galleryStatus.dataset.state = "error";
          } finally {
            state.loading = false;
            renderProductGallery(modal);
          }
        }

        function enhanceProductManagerModals() {
          resolveVisibleProductModals().forEach(function(modal) {
            if (!isProductEditorModal(modal)) return;
            var state = ensureProductManagerWorkspace(modal);
            if (!state) return;
            var nextProductId = extractProductIdFromModal(modal);
            if (state.productId !== nextProductId) {
              state.images = [];
              state.coverImage = "";
              state.loadedFor = "";
            }
            state.productId = nextProductId;
            hydrateProductGallery(modal);
          });
        }

        /* ═══════════════════════════════════════════════════════
           enhanceProductsPage — Products UI refinements
           ═══════════════════════════════════════════════════════ */
        function enhanceProductsPage() {
          var rt = window.__productsRuntime || { running: false, lastRunAt: 0, done: false };
          window.__productsRuntime = rt;
          var now = Date.now();
          if (rt.running || now - Number(rt.lastRunAt || 0) < 300) return;
          rt.running = true;
          rt.lastRunAt = now;

          try {
            var page = document.querySelector(".products-page");
            if (!page) return;
            if (!page.hasAttribute("data-enhanced")) {
              page.setAttribute("data-enhanced", "1");

              /* Give status pills a glassmorphism look */
              page.querySelectorAll(".product-status-pill").forEach(function(pill) {
                pill.style.backdropFilter = "blur(6px)";
                pill.style.webkitBackdropFilter = "blur(6px)";
              });
            }

            ensureProductRefineInterception();
            injectProductDescriptionOptimizer();
            enhanceProductManagerModals();
            suppressBlockedProductRefineFeedback();
          } finally {
            rt.running = false;
          }
        }

        /* ═══════════════════════════════════════════════════════
           enhanceCategoriesModal — Rich category management
           Cover image · Description · Product association
           ═══════════════════════════════════════════════════════ */
        function enhanceCategoriesModal() {
          var rt = window.__catModalRuntime || { running: false, lastRunAt: 0 };
          window.__catModalRuntime = rt;
          var now = Date.now();
          if (rt.running || now - Number(rt.lastRunAt || 0) < 400) return;
          rt.running = true;
          rt.lastRunAt = now;

          try {
            var mgr = document.querySelector(".leads-category-manager .category-manager-body");
            if (!mgr) return;
            if (mgr.querySelector(".cat-advanced-trigger")) return;

            /* ── Inject "Avançado" button next to inline form ── */
            var addForm = mgr.querySelector(".category-add-form");
            if (!addForm) return;

            var advBtn = document.createElement("button");
            advBtn.type = "button";
            advBtn.className = "cat-btn cat-btn-secondary cat-advanced-trigger";
            advBtn.textContent = "✦ Criar avançado";
            advBtn.style.cssText = "margin-left:.3rem;white-space:nowrap;";
            advBtn.addEventListener("click", function() {
              openCategoryAdvancedModal(null);
            });
            addForm.appendChild(advBtn);

            /* ── Add edit icons to existing category pills ── */
            mgr.querySelectorAll(".category-pill").forEach(function(pill) {
              if (pill.querySelector(".cat-edit-btn")) return;
              var catName = pill.textContent.replace("×", "").trim();
              var editBtn = document.createElement("button");
              editBtn.type = "button";
              editBtn.className = "cat-edit-btn";
              editBtn.title = "Editar categoria";
              editBtn.innerHTML = "✎";
              editBtn.style.cssText = "background:none;border:none;cursor:pointer;font-size:.82rem;line-height:1;color:inherit;opacity:.5;padding:0 0 0 .1rem;";
              editBtn.addEventListener("click", function(ev) {
                ev.stopPropagation();
                /* Find category by name in the chip-category buttons */
                var catChips = document.querySelectorAll(".chip-category");
                var foundId = null;
                catChips.forEach(function(chip) {
                  if (chip.textContent.trim() === catName) {
                    foundId = chip.dataset.catId || null;
                  }
                });
                openCategoryAdvancedModal({ name: catName, id: foundId });
              });
              pill.insertBefore(editBtn, pill.querySelector(".cat-remove-btn"));
            });

          } finally {
            rt.running = false;
          }
        }

        /* ── Category advanced modal builder ── */
        function openCategoryAdvancedModal(editData) {
          /* Close any existing */
          var existing = document.getElementById("cat-adv-overlay");
          if (existing) existing.remove();

          var isEdit = editData && editData.id;
          var overlay = document.createElement("div");
          overlay.id = "cat-adv-overlay";
          overlay.className = "modal-overlay cat-enhanced-modal show";
          overlay.style.cssText = "position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(14,29,44,.55);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:9999;display:grid;place-items:center;padding:1rem;";

          var svgSearch = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>';

          overlay.innerHTML = [

                '</div>',
                '<button type="button" class="modal-close cat-adv-close" style="width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--surface);font-size:1.2rem;color:var(--text-soft);cursor:pointer;display:grid;place-items:center;">×</button>',
              '</div>',
              '<div class="cat-enhanced-body" style="padding:1.2rem;display:grid;gap:1.1rem;">',

                '<div class="cat-cover-zone" id="cat-cover-zone">',
                  '<div class="cat-cover-placeholder">',
                    svgCamera,
                    '<span>Clique para adicionar a capa</span>',
                    '<small>JPG, PNG ou WebP — máx. 10 MB</small>',
                  '</div>',
                  '<input type="file" id="cat-cover-input" accept="image/*"/>',
                '</div>',
                /* Name */
                '<div class="cat-field-group">',
                  '<label>Nome <small>(obrigatório)</small></label>',
                  '<input type="text" id="cat-adv-name" placeholder="Ex: Máquinas de Tatuagem" value="' + (editData && editData.name ? editData.name.replace(/"/g, '&quot;') : '') + '"/>',
                '</div>',
                /* Description */
                '<div class="cat-field-group">',
                  '<label>Descrição</label>',
                  '<textarea id="cat-adv-desc" placeholder="Descreva a categoria para seus clientes..." rows="3"></textarea>',
                '</div>',
                /* Color */
                '<div class="cat-field-group">',
                  '<label>Cor da categoria</label>',
                  '<div class="cat-color-row">',
                    '<input type="color" id="cat-adv-color" value="#3b82f6"/>',
                    '<div class="cat-color-preview">',
                      '<span class="cat-color-swatch" id="cat-color-swatch" style="background:#3b82f6;"></span>',
                      '<span id="cat-color-hex">#3b82f6</span>',
                    '</div>',
                  '</div>',
                '</div>',
                /* Product association */
                '<div class="cat-products-section">',
                  '<h4>Produtos associados <span id="cat-prod-count">0</span></h4>',
                  '<div class="cat-products-search">',
                    svgSearch,
                    '<input type="text" id="cat-prod-search" placeholder="Buscar produtos..."/>',
                  '</div>',
                  '<div class="cat-product-chips" id="cat-product-chips">',
                    '<span style="color:var(--text-soft);font-size:.82rem;">Carregando produtos...</span>',
                  '</div>',
                '</div>',
              '</div>',
              /* Actions */
              '<div class="cat-modal-actions">',
                '<button type="button" class="cat-btn cat-btn-secondary cat-adv-close">Cancelar</button>',
                '<button type="button" class="cat-btn cat-btn-primary" id="cat-adv-save">' + (isEdit ? "Salvar alterações" : "Criar categoria") + '</button>',
              '</div>',
            '</div>'
          ].join("");

          document.body.appendChild(overlay);

          /* State */
          var state = {
            coverFile: null,
            coverUrl: "",
            selectedProducts: [],
            allProducts: [],
            categoryId: isEdit ? editData.id : null
          };

          /* References */
          var coverZone = document.getElementById("cat-cover-zone");
          var coverInput = document.getElementById("cat-cover-input");
          var nameInput = document.getElementById("cat-adv-name");
          var descInput = document.getElementById("cat-adv-desc");
          var colorInput = document.getElementById("cat-adv-color");
          var colorSwatch = document.getElementById("cat-color-swatch");
          var colorHex = document.getElementById("cat-color-hex");
          var prodSearch = document.getElementById("cat-prod-search");
          var prodChips = document.getElementById("cat-product-chips");
          var prodCount = document.getElementById("cat-prod-count");
          var saveBtn = document.getElementById("cat-adv-save");

          /* Close handlers */
          overlay.querySelectorAll(".cat-adv-close").forEach(function(btn) {
            btn.addEventListener("click", function() { overlay.remove(); });
          });
          overlay.addEventListener("click", function(ev) {
            if (ev.target === overlay) overlay.remove();
          });

          /* Cover upload click */
          coverZone.addEventListener("click", function() {
            if (!coverZone.classList.contains("has-image")) coverInput.click();
          });
          coverInput.addEventListener("change", function() {
            var file = coverInput.files && coverInput.files[0];
            if (!file) return;
            state.coverFile = file;
            var reader = new FileReader();
            reader.onload = function(e) {
              state.coverUrl = e.target.result;
              coverZone.classList.add("has-image");
              coverZone.innerHTML = '<img src="' + e.target.result + '" alt="Capa"/>' +
                '<button type="button" class="cat-cover-remove" title="Remover capa">×</button>';
              coverZone.querySelector(".cat-cover-remove").addEventListener("click", function(ev) {
                ev.stopPropagation();
                state.coverFile = null;
                state.coverUrl = "";
                coverZone.classList.remove("has-image");
                coverZone.innerHTML = '<div class="cat-cover-placeholder">' + svgCamera +
                  '<span>Clique para adicionar a capa</span>' +
                  '<small>JPG, PNG ou WebP — máx. 10 MB</small></div>' +
                  '<input type="file" id="cat-cover-input" accept="image/*"/>';
                document.getElementById("cat-cover-input").addEventListener("change", coverInput.onchange);
              });
            };
            reader.readAsDataURL(file);
          });

          /* Color sync */
          colorInput.addEventListener("input", function() {
            var v = colorInput.value;
            colorSwatch.style.background = v;
            colorHex.textContent = v;
          });

          /* Load products */
          (function loadProducts() {
            var token = "";
            try { token = localStorage.getItem("token") || ""; } catch(_) {}
            var brandId = "";
            try { brandId = localStorage.getItem("leadcapture_brand_id") || localStorage.getItem("selectedBrandId") || ""; } catch(_) {}

            fetch("/api/products", {
              headers: { "Authorization": "Bearer " + token, "x-brand-id": brandId }
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
              state.allProducts = (data.products || []);
              renderProductChips("");
            })
            .catch(function() {
              prodChips.innerHTML = '<span style="color:var(--text-soft);font-size:.82rem;">Falha ao carregar produtos.</span>';
            });
          })();

          /* If editing, load category data from API */
          if (isEdit && state.categoryId) {
            (function loadCatData() {
              var token = "";
              try { token = localStorage.getItem("token") || ""; } catch(_) {}
              var brandId = "";
              try { brandId = localStorage.getItem("leadcapture_brand_id") || localStorage.getItem("selectedBrandId") || ""; } catch(_) {}
              fetch("/api/categories", {
                headers: { "Authorization": "Bearer " + token, "x-brand-id": brandId }
              })
              .then(function(r) { return r.json(); })
              .then(function(data) {
                var cats = data.categories || [];
                var cat = cats.find(function(c) { return c.id === state.categoryId || c.name === editData.name; });
                if (cat) {
                  state.categoryId = cat.id;
                  if (cat.description) descInput.value = cat.description;
                  if (cat.color) {
                    colorInput.value = cat.color;
                    colorSwatch.style.background = cat.color;
                    colorHex.textContent = cat.color;
                  }
                  if (cat.coverImage) {
                    state.coverUrl = cat.coverImage;
                    coverZone.classList.add("has-image");
                    coverZone.innerHTML = '<img src="' + cat.coverImage + '" alt="Capa"/>' +
                      '<button type="button" class="cat-cover-remove" title="Remover capa">×</button>';
                    coverZone.querySelector(".cat-cover-remove").addEventListener("click", function(ev) {
                      ev.stopPropagation();
                      state.coverFile = null;
                      state.coverUrl = "";
                      coverZone.classList.remove("has-image");
                      coverZone.innerHTML = '<div class="cat-cover-placeholder">' + svgCamera +
                        '<span>Clique para adicionar a capa</span>' +
                        '<small>JPG, PNG ou WebP — máx. 10 MB</small></div>' +
                        '<input type="file" id="cat-cover-input" accept="image/*"/>';
                    });
                  }
                }
              })
              .catch(function() { /* continue without preload */ });
            })();
          }

          function renderProductChips(filter) {
            var lc = (filter || "").toLowerCase();
            var visible = state.allProducts.filter(function(p) {
              if (!lc) return true;
              return (p.name || "").toLowerCase().indexOf(lc) !== -1;
            });
            if (visible.length === 0) {
              prodChips.innerHTML = '<span style="color:var(--text-soft);font-size:.82rem;">' +
                (lc ? "Nenhum produto encontrado." : "Sem produtos cadastrados.") + '</span>';
              return;
            }
            prodChips.innerHTML = visible.map(function(p) {
              var sel = state.selectedProducts.indexOf(p.id) !== -1;
              var thumb = p.imageUrl ? '<img class="chip-thumb" src="' + p.imageUrl + '" alt=""/>' : '';
              return '<span class="cat-product-chip' + (sel ? ' is-selected' : '') +
                '" data-pid="' + p.id + '">' + thumb + p.name + '</span>';
            }).join("");
            prodChips.querySelectorAll(".cat-product-chip").forEach(function(chip) {
              chip.addEventListener("click", function() {
                var pid = chip.dataset.pid;
                var idx = state.selectedProducts.indexOf(pid);
                if (idx === -1) {
                  state.selectedProducts.push(pid);
                  chip.classList.add("is-selected");
                } else {
                  state.selectedProducts.splice(idx, 1);
                  chip.classList.remove("is-selected");
                }
                prodCount.textContent = String(state.selectedProducts.length);
              });
            });
          }

          prodSearch.addEventListener("input", function() {
            renderProductChips(prodSearch.value);
          });

          /* Save */
          saveBtn.addEventListener("click", async function() {
            var name = (nameInput.value || "").trim();
            if (!name) { nameInput.focus(); return; }

            saveBtn.disabled = true;
            saveBtn.textContent = "Salvando...";

            var token = "";
            try { token = localStorage.getItem("token") || ""; } catch(_) {}
            var brandId = "";
            try { brandId = localStorage.getItem("leadcapture_brand_id") || localStorage.getItem("selectedBrandId") || ""; } catch(_) {}
            var headers = { "Authorization": "Bearer " + token, "x-brand-id": brandId, "Content-Type": "application/json" };

            try {
              var catBody = {
                name: name,
                description: (descInput.value || "").trim(),
                color: colorInput.value || "#3b82f6"
              };

              var catRes;
              if (isEdit && state.categoryId) {
                catRes = await fetch("/api/categories/" + state.categoryId, {
                  method: "PUT", headers: headers, body: JSON.stringify(catBody)
                });
              } else {
                catRes = await fetch("/api/categories", {
                  method: "POST", headers: headers, body: JSON.stringify(catBody)
                });
              }

              var catData = await catRes.json();
              var catId = (catData.category && catData.category.id) || state.categoryId;

              /* Upload cover if file selected */
              if (state.coverFile && catId) {
                var fd = new FormData();
                fd.append("image", state.coverFile);
                await fetch("/api/categories/" + catId + "/cover", {
                  method: "POST",
                  headers: { "Authorization": "Bearer " + token, "x-brand-id": brandId },
                  body: fd
                });
              }

              /* Associate products by updating each product's category */
              if (state.selectedProducts.length > 0 && catId) {
                for (var i = 0; i < state.selectedProducts.length; i++) {
                  try {
                    await fetch("/api/products/" + state.selectedProducts[i], {
                      method: "PUT",
                      headers: headers,
                      body: JSON.stringify({ category: name })
                    });
                  } catch(_) { /* best effort */ }
                }
              }

              overlay.remove();
              /* Trigger React re-render to pick up changes */
              window.dispatchEvent(new Event("focus"));
              setTimeout(function() {
                var refreshBtn = document.querySelector('.products-page .btn-secondary[title]');
                if (refreshBtn) refreshBtn.click();
              }, 300);

            } catch(err) {
              saveBtn.disabled = false;
              saveBtn.textContent = isEdit ? "Salvar alterações" : "Criar categoria";
              alert("Erro ao salvar: " + (err.message || "Tente novamente."));
            }
          });
        }

        /* ═══════════════════════════════════════════════════════
           enhanceCampaignsHero — Redesigned campaign header
           Premium gradient strip, icon-enriched tabs, KPI strip
           ═══════════════════════════════════════════════════════ */
        function enhanceCampaignsHero() {
          var rt = window.__campHeroRuntime || { running: false, lastRunAt: 0 };
          window.__campHeroRuntime = rt;
          var now = Date.now();
          if (rt.running || now - Number(rt.lastRunAt || 0) < 350) return;
          rt.running = true;
          rt.lastRunAt = now;

          try {
            var header = document.querySelector(".campaign-page-header");
            if (!header) return;
            if (header.hasAttribute("data-hero-enhanced")) return;
            header.setAttribute("data-hero-enhanced", "1");

            /* ── Upgrade title area ── */
            var titleArea = header.querySelector(".campaign-page-title");
            if (titleArea) {
              var h1 = titleArea.querySelector("h1");
              var p = titleArea.querySelector("p");
              if (h1) {
                h1.innerHTML = '<span style="display:inline-flex;align-items:center;gap:.45rem;">' +
                  '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--primary);flex-shrink:0;">' +
                    '<path d="M22 2 11 13"/><path d="m22 2-7 20-4-9-9-4z"/>' +
                  '</svg>' +
                  'Motor de Campanhas</span>';
              }
              if (p) {
                p.textContent = "Disparo inteligente com filtragem por IA, controle de velocidade e inteligência de resposta automática.";
              }
            }

            /* ── Upgrade tab labels with better icons ── */
            var tabs = header.querySelectorAll(".campaign-page-tabs .btn-tab");
            var tabIcons = {
              "Lista": '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>',
              "Nova Campanha": '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>',
              "Inteligência": '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3M12 17h.01"/></svg>',
              "Flow Builder": '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/><path d="M14 7h3a2 2 0 0 1 2 2v3M10 17H7a2 2 0 0 1-2-2v-3"/></svg>'
            };

            tabs.forEach(function(tab) {
              var text = tab.textContent.replace(/📋|➕|🧠|🧩|BETA/g, "").trim();
              var icon = tabIcons[text];
              if (!icon) return;

              /* Preserve active class and event listeners by only replacing innerHTML */
              var isBeta = tab.classList.contains("btn-tab--beta");
              var betaLabel = isBeta ? '<span class="btn-tab--beta-label">BETA</span>' : '';
              tab.innerHTML = icon + ' ' + text + betaLabel;
            });

            /* ── Inject quick-stats strip between title and tabs ── */
            var tabsNav = header.querySelector(".campaign-page-tabs");
            if (tabsNav && !header.querySelector(".camp-quick-stats")) {
              var statsStrip = document.createElement("div");
              statsStrip.className = "camp-quick-stats";
              statsStrip.style.cssText = [
                "display:flex;gap:.6rem;flex-wrap:wrap;padding:.1rem 1.4rem .7rem;",
                "align-items:center;"
              ].join("");

              /* Fetch campaign stats */
              var token = "";
              try { token = localStorage.getItem("lead-system-token") || localStorage.getItem("token") || ""; } catch(_) {}
              var brandId = "";
              try { brandId = localStorage.getItem("lead-system:active-brand-id") || localStorage.getItem("leadcapture_brand_id") || localStorage.getItem("selectedBrandId") || ""; } catch(_) {}

              statsStrip.innerHTML = [
                '<span class="camp-stat-pill" style="display:inline-flex;align-items:center;gap:.3rem;padding:.22rem .6rem .22rem .45rem;border-radius:8px;font-size:.76rem;font-weight:600;background:color-mix(in srgb, var(--primary) 8%, var(--surface) 92%);color:var(--primary);border:1px solid color-mix(in srgb, var(--primary) 18%, var(--border) 82%);">',
                  '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M22 2 11 13"/><path d="m22 2-7 20-4-9-9-4z"/></svg>',
                  '<span id="camp-stat-total">—</span> campanhas',
                '</span>',
                '<span class="camp-stat-pill" style="display:inline-flex;align-items:center;gap:.3rem;padding:.22rem .6rem .22rem .45rem;border-radius:8px;font-size:.76rem;font-weight:600;background:color-mix(in srgb, var(--success) 8%, var(--surface) 92%);color:var(--success);border:1px solid color-mix(in srgb, var(--success) 18%, var(--border) 82%);">',
                  '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>',
                  '<span id="camp-stat-completed">—</span> concluídas',
                '</span>',
                '<span class="camp-stat-pill" style="display:inline-flex;align-items:center;gap:.3rem;padding:.22rem .6rem .22rem .45rem;border-radius:8px;font-size:.76rem;font-weight:600;background:color-mix(in srgb, #f59e0b 8%, var(--surface) 92%);color:#d97706;border:1px solid color-mix(in srgb, #f59e0b 18%, var(--border) 82%);">',
                  '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>',
                  '<span id="camp-stat-active">—</span> ativas',
                '</span>'
              ].join("");

              header.insertBefore(statsStrip, tabsNav);

              /* Load real stats */
              fetch("/api/campaigns", {
                headers: { "Authorization": "Bearer " + token, "x-brand-id": brandId }
              })
              .then(function(r) { return r.json(); })
              .then(function(data) {
                var campaigns = data.campaigns || data || [];
                if (!Array.isArray(campaigns)) return;
                var total = campaigns.length;
                var completed = campaigns.filter(function(c) {
                  return c.status === "completed" || c.status === "done" || c.status === "finished";
                }).length;
                var active = campaigns.filter(function(c) {
                  return c.status === "running" || c.status === "active" || c.status === "in_progress" || c.status === "sending";
                }).length;
                var elTotal = document.getElementById("camp-stat-total");
                var elCompleted = document.getElementById("camp-stat-completed");
                var elActive = document.getElementById("camp-stat-active");
                if (elTotal) elTotal.textContent = String(total);
                if (elCompleted) elCompleted.textContent = String(completed);
                if (elActive) elActive.textContent = String(active);
              })
              .catch(function() { /* silent */ });
            }

          } finally {
            rt.running = false;
          }
        }

        function ensureCampaignRuntimeBridge() {
          var runtime = window.__campaignRuntimeBridge || { initialized: false, currentCampaignId: "" };
          window.__campaignRuntimeBridge = runtime;
          if (runtime.initialized) return runtime;

          runtime.initialized = true;

          function captureCampaignId(url, method) {
            if (String(method || "GET").toUpperCase() !== "GET") return;
            var match = String(url || "").match(/\/api\/campaigns-v2\/([^\/?#]+)(?:[\/?#]|$)/i);
            if (!match || !match[1]) return;
            try {
              runtime.currentCampaignId = decodeURIComponent(match[1]);
            } catch (_) {
              runtime.currentCampaignId = match[1];
            }
          }

          var originalFetch = window.fetch;
          if (typeof originalFetch === "function") {
            window.fetch = function (input, init) {
              try {
                var url = typeof input === "string"
                  ? input
                  : input && typeof input.url === "string"
                    ? input.url
                    : "";
                var method = init && init.method
                  ? init.method
                  : input && typeof input.method === "string"
                    ? input.method
                    : "GET";
                captureCampaignId(url, method);
              } catch (_) {}
              return originalFetch.apply(this, arguments);
            };
          }

          return runtime;
        }

        function enhanceCampaignActionExtensions() {
          var runtime = ensureCampaignRuntimeBridge();
          var actionBar = document.querySelector(".campaign-action-bar");
          if (!actionBar) return;

          function getCampaignIdFromDom() {
            /* 1) Try readonly input in edit form */
            var idInput = document.querySelector('.campaign-edit-form input[readonly]');
            var value = idInput && typeof idInput.value === "string" ? idInput.value.trim() : "";
            if (value) {
              runtime.currentCampaignId = value;
              return value;
            }
            /* 2) Try runtime bridge (populated by fetch interceptor) */
            if (runtime.currentCampaignId) return String(runtime.currentCampaignId).trim();
            /* 3) Try URL hash pattern like #/campaigns/:id */
            var hashMatch = String(window.location.hash || "").match(/campaigns[/-](?:v2[/-])?([a-f0-9-]{8,})/i);
            if (hashMatch && hashMatch[1]) {
              runtime.currentCampaignId = hashMatch[1];
              return hashMatch[1];
            }
            return "";
          }

          function getHeaders() {
            var headers = { Accept: "application/json" };
            var token = "";
            var brandId = "";
            var activeBrandKeys = ["lead-system:active-brand-id", "leadcapture_brand_id", "selectedBrandId"];
            try { token = String(localStorage.getItem("lead-system-token") || "").trim(); } catch (_) {}
            try {
              for (var i = 0; i < activeBrandKeys.length; i += 1) {
                var candidate = String(localStorage.getItem(activeBrandKeys[i]) || "").trim();
                if (candidate) {
                  brandId = candidate;
                  break;
                }
              }
            } catch (_) {}
            if (token) headers.Authorization = "Bearer " + token;
            if (brandId) headers["x-brand-id"] = brandId;
            return headers;
          }

          function showNotice(message, kind) {
            var notice = document.getElementById("campaign-runtime-notice");
            if (!notice) {
              notice = document.createElement("div");
              notice.id = "campaign-runtime-notice";
              notice.style.cssText = [
                "position:fixed",
                "right:20px",
                "bottom:20px",
                "z-index:99999",
                "padding:12px 16px",
                "border-radius:14px",
                "box-shadow:0 18px 50px rgba(15,23,42,.18)",
                "font-size:14px",
                "font-weight:700",
                "max-width:min(92vw,420px)",
                "line-height:1.4"
              ].join(";");
              document.body.appendChild(notice);
            }

            if (kind === "error") {
              notice.style.background = "#fee2e2";
              notice.style.color = "#991b1b";
              notice.style.border = "1px solid #fecaca";
            } else {
              notice.style.background = "#dcfce7";
              notice.style.color = "#166534";
              notice.style.border = "1px solid #bbf7d0";
            }

            notice.textContent = message;
            notice.style.display = "block";
            window.clearTimeout(notice.__hideTimer);
            notice.__hideTimer = window.setTimeout(function () {
              notice.style.display = "none";
            }, 3200);
          }

          function refreshCampaignView() {
            /* Try clicking the "Atualizar" button inside the action bar */
            var refreshButton = Array.prototype.slice.call(
              document.querySelectorAll(".campaign-action-bar button, .campaign-detail button")
            ).find(function (button) {
              return /atualizar/i.test(button.textContent || "");
            });
            if (refreshButton && !refreshButton.disabled) {
              refreshButton.click();
              return;
            }
            /* Fallback: click "← Voltar" to return to list */
            var backButton = Array.prototype.slice.call(
              document.querySelectorAll(".campaign-detail-header button")
            ).find(function (button) {
              return /voltar/i.test(button.textContent || "");
            });
            if (backButton) backButton.click();
          }

          function runAction(action, button) {
            var campaignId = getCampaignIdFromDom();
            if (!campaignId) {
              showNotice("Nao foi possivel identificar a campanha aberta.", "error");
              return;
            }

            var isDuplicate = action === "duplicate";
            var confirmed = window.confirm(
              isDuplicate
                ? "Criar uma nova copia desta campanha em rascunho?"
                : "Reutilizar esta campanha agora? Isso reabre a mesma campanha para novo disparo."
            );
            if (!confirmed) return;

            var endpoint = "/api/campaigns-v2/" + encodeURIComponent(campaignId) + (isDuplicate ? "/duplicate" : "/re-execute");
            var idleLabel = button.textContent;
            button.disabled = true;
            button.textContent = isDuplicate ? "Duplicando..." : "Reutilizando...";

            fetch(endpoint, {
              method: "POST",
              headers: getHeaders()
            })
              .then(function (response) {
                return response.json().catch(function () { return {}; }).then(function (payload) {
                  if (!response.ok || payload.success === false) {
                    throw new Error(payload.error || payload.message || "Falha ao executar a acao da campanha.");
                  }
                  return payload;
                });
              })
              .then(function (payload) {
                showNotice(payload.message || (isDuplicate ? "Campanha duplicada com sucesso!" : "Campanha pronta para reutilização."), "success");
                if (isDuplicate) {
                  /* After duplicate, go back to list to see the new campaign */
                  setTimeout(function() {
                    var backBtn = Array.prototype.slice.call(
                      document.querySelectorAll(".campaign-detail-header button")
                    ).find(function(b) { return /voltar/i.test(b.textContent || ""); });
                    if (backBtn) backBtn.click();
                  }, 800);
                } else {
                  /* After re-execute, refresh to show updated status */
                  refreshCampaignView();
                }
              })
              .catch(function (error) {
                showNotice(error && error.message ? error.message : "Erro ao executar a acao da campanha.", "error");
              })
              .finally(function () {
                button.disabled = false;
                button.textContent = idleLabel;
              });
          }

          /* Always inject buttons if campaign-action-bar is visible (ID resolved at click time) */
          var wrapper = actionBar.querySelector(".campaign-runtime-actions");
          if (!wrapper) {
            wrapper = document.createElement("div");
            wrapper.className = "campaign-runtime-actions";
            wrapper.style.cssText = "display:flex;gap:8px;flex-wrap:wrap;align-items:center;";

            var duplicateButton = document.createElement("button");
            duplicateButton.type = "button";
            duplicateButton.className = "btn-secondary";
            duplicateButton.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="vertical-align:-2px;margin-right:4px;"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Duplicar';
            duplicateButton.addEventListener("click", function () {
              runAction("duplicate", duplicateButton);
            });

            var reuseButton = document.createElement("button");
            reuseButton.type = "button";
            reuseButton.className = "btn-secondary";
            reuseButton.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="vertical-align:-2px;margin-right:4px;"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>Reutilizar';
            reuseButton.addEventListener("click", function () {
              runAction("re-execute", reuseButton);
            });

            wrapper.appendChild(duplicateButton);
            wrapper.appendChild(reuseButton);
            actionBar.appendChild(wrapper);
          }

          var currentCampaignId = getCampaignIdFromDom();
          if (currentCampaignId) {
            wrapper.setAttribute("data-campaign-id", currentCampaignId);
          }
        }

        let enhanceScheduled = false;
        const runEnhancers = function () {
          enhancePasswordFields();
          enhanceBrandLogoUploader();
          enhanceGlobalUploadCards();
          enhanceBrandIdentityRuntime();
          enhanceBrandLogoInLists();
          enhanceLojaMobilePage();
          enhanceStockAccessSettings();
          enhanceLeadCaptureModal();
          enhancePremiumAppHeader();
          enhanceAgentWorkspace();
          enhanceWhatsAppAgentBridge();
          enhanceProductsPage();
          enhanceCategoriesModal();
          enhanceCampaignsHero();
          enhanceCampaignActionExtensions();
        };

        const scheduleEnhancers = function () {
          if (enhanceScheduled) return;
          enhanceScheduled = true;
          window.requestAnimationFrame(function () {
            enhanceScheduled = false;
            runEnhancers();
          });
        };

        const observer = new MutationObserver(function () {
          scheduleEnhancers();
        });

        observer.observe(document.body || document.documentElement, { childList: true, subtree: true });
        runEnhancers();
      })();
    </script>
  </body>
</html>
